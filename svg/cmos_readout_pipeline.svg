<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-label="CMOS 像素从电荷到 RAW 码值的读出链"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker></defs><rect width="1200" height="440" fill="#fbfdff" /><text x="600.0" y="40" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#102a43">增益放在哪里，决定哪些噪声会被共同放大</text><rect x="20" y="80" width="200" height="110" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="120.0" y="124" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">光电二极管</text><text x="120.0" y="164" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">Ne 电子</text><rect x="260" y="80" width="200" height="110" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="360.0" y="124" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">浮动扩散节点</text><text x="360.0" y="164" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">ΔV = qeNe/Cfd</text><rect x="500" y="80" width="200" height="110" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="600.0" y="124" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">相关双采样</text><text x="600.0" y="164" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">复位样本 − 信号样本</text><rect x="740" y="80" width="200" height="110" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="840.0" y="124" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">模拟增益</text><text x="840.0" y="164" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">ga</text><rect x="980" y="80" width="200" height="110" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1080.0" y="124" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">ADC 与数字偏置</text><text x="1080.0" y="164" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">B bit → RAW DN</text><line x1="222" y1="135" x2="258" y2="135" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="462" y1="135" x2="498" y2="135" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="702" y1="135" x2="738" y2="135" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="942" y1="135" x2="978" y2="135" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><circle cx="120" cy="260" r="10" fill="#4d8c6a" /><line x1="120" y1="248" x2="120" y2="200" stroke="#4d8c6a" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 5" /><text x="120" y="296" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#4d8c6a">光子与暗电荷</text><text x="120" y="322" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">积分前/期间</text><circle cx="360" cy="320" r="10" fill="#3b82b5" /><line x1="360" y1="308" x2="360" y2="200" stroke="#3b82b5" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 5" /><text x="360" y="356" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#3b82b5">像素源跟随器</text><text x="360" y="382" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">模拟读出</text><circle cx="600" cy="260" r="10" fill="#c58a2d" /><line x1="600" y1="248" x2="600" y2="200" stroke="#c58a2d" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 5" /><text x="600" y="296" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#c58a2d">列放大与 CDS 残差</text><text x="600" y="322" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">增益之前</text><circle cx="840" cy="320" r="10" fill="#7b4b74" /><line x1="840" y1="308" x2="840" y2="200" stroke="#7b4b74" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 5" /><text x="840" y="356" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#7b4b74">下游放大器</text><text x="840" y="382" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">增益之后</text><circle cx="1080" cy="260" r="10" fill="#c85b73" /><line x1="1080" y1="248" x2="1080" y2="200" stroke="#c85b73" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 5" /><text x="1080" y="296" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#c85b73">量化与数字处理</text><text x="1080" y="322" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">ADC/编码</text><text x="600.0" y="420" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#7b4b74">模拟增益可压低其后噪声折算到输入端的影响，却不能改善此前已形成的散粒涨落</text></svg>