nd" stroke-linecap="round" /><line x1="500" y1="185" x2="570" y2="185" stroke="#3b82b5" stroke-width="6" stroke-linecap="round" /><text x="590" y="192" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#3b82b5">独立噪声</text><line x1="500" y1="230" x2="570" y2="230" stroke="#c85b73" stroke-width="6" stroke-linecap="round" /><text x="590" y="237" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#c85b73">含相关/固定项</text><text x="140" y="615" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">4 帧约降 1 档标准差；16 帧约降 2 档，但帧数翻倍收益递减</text><rect x="875" y="125" width="270" height="165" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1010.0" y="167" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">静态且配准</text><text x="1010.0" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">随机颗粒变细</text><circle cx="1010.0" cy="237" r="42" fill="#4d8c6a" fill-opacity="0.08" /><circle cx="1010.0" cy="237" r="27" fill="#4d8c6a" fill-opacity="0.16" /><circle cx="1010.0" cy="237" r="13" fill="#4d8c6a" fill-opacity="0.68" /><rect x="875" y="330" width="250" height="165" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1000.0" y="372" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">主体运动</text><text x="1000.0" y="406" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">出现重影或被抹除</text><circle cx="975.0" cy="442" r="23" fill="#c85b73" fill-opacity="0.35" /><circle cx="1000.0" cy="442" r="23" fill="#c85b73" fill-opacity="0.75" /><circle cx="1028.0" cy="442" r="23" fill="#c85b73" fill-opacity="0.35" /><rect x="1180" y="330" width="250" height="165" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1305.0" y="372" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">视差 / 错配</text><text x="1305.0" y="406" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">不同深度双边缘</text><rect x="1249.0" y="417" width="76" height="50" rx="7" fill="#3b82b5" fill-opacity=".38" /><rect x="1285.0" y="417" width="76" height="50" rx="7" fill="#7b4b74" fill-opacity=".38" /><line x1="1145" y1="207" x2="1280" y2="310" stroke="#9ab3c6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="915" y="600" width="460" height="90" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1145.0" y="642" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">平均只消除帧间变化的零均值部分</text><text x="1145.0" y="676" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">固定图样、模型偏差和稳定重影会留下来</text></svg>