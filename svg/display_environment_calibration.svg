<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-label="显示器校准环境光与观看条件"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="790" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">显示器只是输出系统的一部分：环境反射与视觉适应共同决定可见黑位和白点</text><rect x="60" y="125" width="600" height="500" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="360.0" y="167" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#285b7a">显示设备状态</text><text x="360.0" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">先稳定，再测量，再验证</text><rect x="170" y="260" width="380" height="220" rx="12" fill="#243b53" stroke="#829ab1" stroke-width="5" /><rect x="200" y="300" width="72" height="135" fill="#dce7ef" /><rect x="282" y="300" width="72" height="135" fill="#a9becd" /><rect x="364" y="300" width="72" height="135" fill="#6f8799" /><rect x="446" y="300" width="72" height="135" fill="#334e68" /><line x1="360" y1="480" x2="360" y2="535" stroke="#627d98" stroke-width="8" stroke-linecap="round" /><line x1="285" y1="535" x2="435" y2="535" stroke="#627d98" stroke-width="8" stroke-linecap="round" /><text x="360" y="585" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">白点 · 亮度 · 黑位 · 灰阶 · 原色</text><rect x="790" y="120" width="610" height="145" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1095.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#8a5f19">环境光</text><text x="1095.0" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">反射抬高屏幕黑位；彩色墙面改变适应与视觉白</text><rect x="790" y="320" width="610" height="145" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1095.0" y="362" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#285b7a">界面与周边</text><text x="1095.0" y="396" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">明亮网页、深灰编辑器和暗展厅产生不同局部对比</text><rect x="790" y="520" width="610" height="145" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1095.0" y="562" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">验证</text><text x="1095.0" y="596" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">灰阶、色差、均匀性和目标亮度需定期复测</text><rect x="265" y="710" width="970" height="48" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="752" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#a24862">不要用显示器亮度滑块修照片：先把设备和环境固定，再判断图像</text></svg>