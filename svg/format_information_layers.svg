<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="780" viewBox="0 0 1500 780" role="img" aria-label="图像格式需要分开比较容器编码像素模型和元数据"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="780" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">文件后缀不是信息量：容器、编码、像素模型与处理状态必须分层比较</text><rect x="55" y="95" width="295" height="65" rx="10" fill="#334e68" /><text x="202.5" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#ffffff">格式族</text><rect x="350" y="95" width="265" height="65" rx="10" fill="#334e68" /><text x="482.5" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#ffffff">典型像素状态</text><rect x="615" y="95" width="285" height="65" rx="10" fill="#334e68" /><text x="757.5" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#ffffff">编码与精度</text><rect x="900" y="95" width="280" height="65" rx="10" fill="#334e68" /><text x="1040.0" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#ffffff">元数据/可编辑性</text><rect x="1180" y="95" width="265" height="65" rx="10" fill="#334e68" /><text x="1312.5" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#ffffff">主要角色</text><rect x="55" y="175" width="295" height="92" fill="#eaf4ff" stroke="#ffffff" stroke-width="3" /><text x="202.5" y="215" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#243b53">相机 RAW / DNG</text><rect x="350" y="175" width="265" height="92" fill="#eaf4ff" stroke="#ffffff" stroke-width="3" /><text x="482.5" y="215" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">CFA 或传感器域</text><rect x="615" y="175" width="285" height="92" fill="#eaf4ff" stroke="#ffffff" stroke-width="3" /><text x="757.5" y="215" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">打包整数；可无损/有损</text><rect x="900" y="175" width="280" height="92" fill="#eaf4ff" stroke="#ffffff" stroke-width="3" /><text x="1040.0" y="215" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">校准元数据丰富</text><rect x="1180" y="175" width="265" height="92" fill="#eaf4ff" stroke="#ffffff" stroke-width="3" /><text x="1312.5" y="215" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">原始测量与再解释</text><rect x="55" y="271" width="295" height="92" fill="#edf8f2" stroke="#ffffff" stroke-width="3" /><text x="202.5" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#243b53">TIFF / OpenEXR</text><rect x="350" y="271" width="265" height="92" fill="#edf8f2" stroke="#ffffff" stroke-width="3" /><text x="482.5" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">RGB/灰度；常为场景参照</text><rect x="615" y="271" width="285" height="92" fill="#edf8f2" stroke="#ffffff" stroke-width="3" /><text x="757.5" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">整数或浮点；可无损</text><rect x="900" y="271" width="280" height="92" fill="#edf8f2" stroke="#ffffff" stroke-width="3" /><text x="1040.0" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">配置文件与辅助通道</text><rect x="1180" y="271" width="265" height="92" fill="#edf8f2" stroke="#ffffff" stroke-width="3" /><text x="1312.5" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">中间交换与高精度母版</text><rect x="55" y="367" width="295" height="92" fill="#fff7e8" stroke="#ffffff" stroke-width="3" /><text x="202.5" y="407" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#243b53">JPEG</text><rect x="350" y="367" width="265" height="92" fill="#fff7e8" stroke="#ffffff" stroke-width="3" /><text x="482.5" y="407" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">通常显示参照 YCbCr</text><rect x="615" y="367" width="285" height="92" fill="#fff7e8" stroke="#ffffff" stroke-width="3" /><text x="757.5" y="407" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">8 位常见；有损 DCT</text><rect x="900" y="367" width="280" height="92" fill="#fff7e8" stroke="#ffffff" stroke-width="3" /><text x="1040.0" y="407" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">EXIF/ICC 可携带</text><rect x="1180" y="367" width="265" height="92" fill="#fff7e8" stroke="#ffffff" stroke-width="3" /><text x="1312.5" y="407" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">兼容交付与网络传输</text><rect x="55" y="463" width="295" height="92" fill="#f7efff" stroke="#ffffff" stroke-width="3" /><text x="202.5" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#243b53">HEIF/AVIF</text><rect x="350" y="463" width="265" height="92" fill="#f7efff" stroke="#ffffff" stroke-width="3" /><text x="482.5" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">显示参照或 HDR 图像</text><rect x="615" y="463" width="285" height="92" fill="#f7efff" stroke="#ffffff" stroke-width="3" /><text x="757.5" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">高效有损/无损；可高位深</text><rect x="900" y="463" width="280" height="92" fill="#f7efff" stroke="#ffffff" stroke-width="3" /><text x="1040.0" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">序列、辅助图与色彩信息</text><rect x="1180" y="463" width="265" height="92" fill="#f7efff" stroke="#ffffff" stroke-width="3" /><text x="1312.5" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">现代交付与计算照片容器</text><rect x="55" y="559" width="295" height="92" fill="#fff0f3" stroke="#ffffff" stroke-width="3" /><text x="202.5" y="599" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#243b53">参数文件/sidecar</text><rect x="350" y="559" width="265" height="92" fill="#fff0f3" stroke="#ffffff" stroke-width="3" /><text x="482.5" y="599" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">不存完整像素</text><rect x="615" y="559" width="285" height="92" fill="#fff0f3" stroke="#ffffff" stroke-width="3" /><text x="757.5" y="599" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">操作图与参数</text><rect x="900" y="559" width="280" height="92" fill="#fff0f3" stroke="#ffffff" stroke-width="3" /><text x="1040.0" y="599" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">依赖原始文件和软件语义</text><rect x="1180" y="559" width="265" height="92" fill="#fff0f3" stroke="#ffffff" stroke-width="3" /><text x="1312.5" y="599" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#243b53">非破坏编辑的决策记录</text><rect x="200" y="685" width="1100" height="62" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="750.0" y="727" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#7b4b74">“无损”只说明给定编码的比特可逆；若像素此前已裁切、去马赛克或色调映射，早期信息仍不会回来</text></svg>