<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="650" viewBox="0 0 1350 650" role="img" aria-label="孔径光阑与入瞳出瞳"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker></defs><rect width="1350" height="650" fill="#fbfdff" /><text x="675.0" y="45" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">同一个物理光阑，经前后镜组形成两个瞳像</text><line x1="70" y1="330" x2="1280" y2="330" stroke="#9fb3c2" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow-dark)" /><path d="M 360 125 C 315 190 315 470 360 535 C 405 470 405 190 360 125 Z" fill="#eef6fb" stroke="#5a9bcc" stroke-width="3" /><text x="360" y="575" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#5a9bcc">前透镜组</text><path d="M 860 125 C 815 190 815 470 860 535 C 905 470 905 190 860 125 Z" fill="#f5effb" stroke="#8d6bb4" stroke-width="3" /><text x="860" y="575" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8d6bb4">后透镜组</text><line x1="650" y1="105" x2="650" y2="250" stroke="#334e68" stroke-width="8" stroke-linecap="round" /><line x1="650" y1="410" x2="650" y2="555" stroke="#334e68" stroke-width="8" stroke-linecap="round" /><text x="650" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#243b53">孔径光阑</text><text x="650" y="365" text-anchor="middle" 