<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="由原色色度和白点构造RGB到XYZ矩阵及超色域映射"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">RGB 空间由原色、白点和编码曲线共同定义</text><rect x="35" y="110" width="250" height="130" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="160.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">原色色度</text><text x="160.0" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">(xr,yr),(xg,yg),(xb,yb)</text><rect x="330" y="110" width="250" height="130" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="455.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">单位亮度原色</text><text x="455.0" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">pi=(xi/yi,1,(1−xi−yi)/yi)</text><rect x="625" y="110" width="250" height="130" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">白点定标</text><text x="750.0" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">s=P⁻¹w</text><rect x="920" y="110" width="250" height="130" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1045.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">线性矩阵</text><text x="1045.0" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">M=P diag(s)</text><rect x="1215" y="110" width="250" height="130" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1340.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">XYZ</text><text x="1340.0" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">t=M rgblinear</text><line x1="285" y1="175" x2="323" y2="175" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="580" y1="175" x2="618" y2="175" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="875" y1="175" x2="913" y2="175" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1170" y1="175" x2="1208" y2="175" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750" y="280" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#7b4b74">矩阵只作用于线性光 RGB；非线性编码值必须先逆 OETF</text><line x1="750" y1="315" x2="750" y2="660" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="375" y="350" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">RGB 立方体经线性变换成为 XYZ 平行六面体</text><polyline points="170.00,585.00 430.00,585.00 430.00,410.00 170.00,410.00 170.00,585.00" stroke="#3b82b5" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round" /><polyline points="260.00,530.00 520.00,530.00 520.00,355.00 260.00,355.00 260.00,530.00" stroke="#4d8c6a" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round" /><line x1="170" y1="585" x2="260" y2="530" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><line x1="430" y1="585" x2="520" y2="530" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><line x1="430" y1="410" x2="520" y2="355" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><line x1="170" y1="410" x2="260" y2="355" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><text x="170" y="573" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">0</text><text x="430" y="573" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">R</text><text x="170" y="398" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">G</text><text x="260" y="343" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">B</text><text x="520" y="343" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">R+G+B</text><text x="350" y="630" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#486581">非负 RGB 只是三维颜色空间中的有限子集</text><text x="1125" y="350" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#a24862">超色域点的三种处理</text><polygon points="850.00,615.00 1090.00,390.00 1230.00,615.00" fill="#eaf4ff" stroke="#3b82b5" stroke-width="3" stroke-linejoin="round" fill-opacity="0.45" /><circle cx="1305" cy="430" r="10" fill="#c85b73" /><text x="1320" y="422" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#a24862">目标色</text><line x1="1295" y1="430" x2="1190" y2="570" stroke="#c85b73" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5" marker-end="url(#arrow-red)" /><circle cx="1190" cy="570" r="7" fill="#c85b73" /><text x="1202" y="575" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#c85b73">逐通道裁切</text><line x1="1295" y1="434" x2="1135" y2="520" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5" /><circle cx="1135" cy="520" r="7" fill="#4d8c6a" /><text x="1147" y="525" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#4d8c6a">保持色相压缩</text><line x1="1295" y1="438" x2="1045" y2="470" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5" /><circle cx="1045" cy="470" r="7" fill="#7b4b74" /><text x="1057" y="475" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#7b4b74">允许负中间值</text><text x="1125" y="660" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#7b4b74">选择映射规则，就是选择哪些关系优先保留</text></svg>