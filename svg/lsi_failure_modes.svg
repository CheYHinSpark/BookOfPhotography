<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="740" viewBox="0 0 1500 740" role="img" aria-label="线性移不变卷积模型的成立条件与失效方式"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="740" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">卷积模型是一种局部近似：线性、移不变、单一曝光与已知边界缺一不可</text><rect x="55" y="120" width="410" height="205" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="260.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">空间变化 PSF</text><text x="260.0" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">像差、场曲、数字畸变校正</text><text x="260" y="255" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">h(x,ξ) 依赖像点位置</text><line x1="125" y1="285" x2="395" y2="285" stroke="#9bc7ee" stroke-width="3" stroke-linecap="round" /><rect x="520" y="120" width="410" height="205" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="725.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">亮度非线性</text><text x="725.0" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">饱和、色调曲线、局部 HDR</text><text x="725" y="255" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">h*(af) ≠ a(h*f)</text><line x1="590" y1="285" x2="860" y2="285" stroke="#eab0be" stroke-width="3" stroke-linecap="round" /><rect x="985" y="120" width="410" height="205" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1190.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">时间变化</text><text x="1190.0" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">滚动快门、抖动路径、主体运动</text><text x="1190" y="255" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">每行/每物体具有不同核</text><line x1="1055" y1="285" x2="1325" y2="285" stroke="#c9a9e8" stroke-width="3" stroke-linecap="round" /><rect x="55" y="385" width="410" height="205" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="260.0" y="427" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">边界未知</text><text x="260.0" y="461" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">零填充、镜像、周期延拓</text><text x="260" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">图外内容影响卷积结果</text><line x1="125" y1="550" x2="395" y2="550" stroke="#e8c77d" stroke-width="3" stroke-linecap="round" /><rect x="520" y="385" width="410" height="205" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="725.0" y="427" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">采样与混叠</text><text x="725.0" y="461" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">先模糊再采样并非可逆</text><text x="725" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">高频折叠后不再独立</text><line x1="590" y1="550" x2="860" y2="550" stroke="#9fd6b7" stroke-width="3" stroke-linecap="round" /><rect x="985" y="385" width="410" height="205" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1190.0" y="427" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">空间耦合处理</text><text x="1190.0" y="461" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">去马赛克、降噪、锐化</text><text x="1190" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">有效核依赖内容和通道</text><line x1="1055" y1="550" x2="1325" y2="550" stroke="#a8c8e0" stroke-width="3" stroke-linecap="round" /><rect x="260" y="650" width="980" height="62" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="750.0" y="692" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#334e68">实际复原常把图像分块、估计局部 PSF 或直接使用一般线性算子 H，而不是强行假设全局卷积</text></svg>