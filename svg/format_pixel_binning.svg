<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="690" viewBox="0 0 1500 690" role="img" aria-label="像素面积传感器面积与像素合并的信号统计"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="690" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">比较像素前先决定：固定单位面积、整块传感器，还是同尺寸输出</text><line x1="760" y1="82" x2="760" y2="610" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="380" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#285b7a">同一感光面积：一个大像素 vs 四个小像素</text><rect x="105" y="165" width="230" height="230" fill="#eaf4ff" stroke="#3b82b5" stroke-width="4" /><text x="220" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#285b7a">4μ</text><text x="220" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">一个读出节点</text><rect x="435" y="165" width="115" height="115" fill="#edf8f2" stroke="#4d8c6a" stroke-width="3" /><text x="492.5" y="230.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">μ</text><rect x="550" y="165" width="115" height="115" fill="#edf8f2" stroke="#4d8c6a" stroke-width="3" /><text x="607.5" y="230.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">μ</text><rect x="435" y="280" width="115" height="115" fill="#edf8f2" stroke="#4d8c6a" stroke-width="3" /><text x="492.5" y="345.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">μ</text><rect x="550" y="280" width="115" height="115" fill="#edf8f2" stroke="#4d8c6a" stroke-width="3" /><text x="607.5" y="345.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">μ</text><text x="550" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">四个读出节点</text><line x1="345" y1="280" x2="420" y2="280" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="380" y="500" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#7b4b74">光子总数相同；分别读出时，读出方差会相加</text><text x="1130" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#397456">合并方式决定信号与噪声的缩放</text><rect x="835" y="155" width="590" height="115" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1130.0" y="198" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#397456">数字求和 n 个像素</text><text x="1130.0" y="233" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">S=nμ，Var=nμ+nσᵣ²</text><rect x="835" y="315" width="590" height="115" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1130.0" y="358" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">数字平均后保持相同输出尺度</text><text x="1130.0" y="393" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">均值=μ，标准差=√(μ+σᵣ²)/√n</text><rect x="835" y="475" width="590" height="115" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1130.0" y="518" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">电荷域合并</text><text x="1130.0" y="553" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">若只读出一次，可少付部分读出噪声</text><text x="750.0" y="650" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#7b4b74">更大传感器在同 f 数、快门与场景辐亮度下接收更多总光；像素尺寸只是分割方式之一</text></svg>