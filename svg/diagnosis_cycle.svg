<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-label="照片质量诊断的症状假设实验与决策闭环"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="820" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">先找伪影首次出现的位置，再改变一个变量验证；修图不是诊断的第一步</text><rect x="55" y="180" width="230" height="180" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="170.0" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">定义症状</text><text x="170" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">在最终尺寸描述</text><text x="170" y="310" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">位置、方向、尺度</text><rect x="345" y="180" width="230" height="180" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="460.0" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">定位阶段</text><text x="460" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">原始数据 → 中间结果</text><text x="460" y="310" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">→ 交付与观看</text><rect x="635" y="180" width="230" height="180" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">提出假设</text><text x="750" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">只保留能解释证据的</text><text x="750" y="310" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">两三个候选原因</text><rect x="925" y="180" width="230" height="180" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1040.0" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">最小实验</text><text x="1040" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">固定其余条件</text><text x="1040" y="310" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">重复采样并留记录</text><rect x="1215" y="180" width="230" height="180" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1330.0" y="222" 