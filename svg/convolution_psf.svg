<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="点扩散函数与卷积成像"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">线性移不变成像：每个物点复制同一个 PSF，整幅图像由平移副本叠加</text><rect x="45" y="115" width="360" height="435" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="225.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">物体 f(x)</text><text x="225.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">若干加权点源</text><circle cx="125" cy="425" r="9" fill="#3b82b5" /><line x1="125" y1="439" x2="125" y2="510" stroke="#a8c8e0" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 6" /><circle cx="190" cy="270" r="16" fill="#3b82b5" /><line x1="190" y1="291" x2="190" y2="510" stroke="#a8c8e0" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 6" /><circle cx="260" cy="370" r="12" fill="#3b82b5" /><line x1="260" y1="387" x2="260" y2="510" stroke="#a8c8e0" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 6" /><circle cx="330" cy="220" r="20" fill="#3b82b5" /><line x1="330" y1="245" x2="330" y2="510" stroke="#a8c8e0" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 6" /><rect x="570" y="115" width="360" height="435" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="750.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">系统 h(x)</text><text x="750.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">单个点的像</text><circle cx="750" cy="340" r="95" fill="#4d8c6a" fill-opacity="0.05" /><circle cx="750" cy="340" r="68" fill="#4d8c6a" fill-opacity="0.1" /><circle cx="750" cy="340" r="43" fill="#4d8c6a" fill-opacity="0.2" /><circle cx="750" cy="340" r="22" fill="#4d8c6a" fill-opacity="0.45" /><circle cx="750" cy="340" r="8" fill="#4d8c6a" fill-opacity="0.85" /><text x="750" y="495" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">∫h(x)dx = 1</text><rect x="1095" y="115" width="360" height="435" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1275.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">图像 g=f*h+n</text><text x="1275.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">平移 PSF 的加权和</text><circle cx="1175" cy="425" r="27.0" fill="#c85b73" fill-opacity="0.07" /><circle cx="1175" cy="425" r="18.0" fill="#c85b73" fill-opacity="0.14" /><circle cx="1175" cy="425" r="9.9" fill="#c85b73" fill-opacity="0.32" /><circle cx="1240" cy="270" r="48.0" fill="#c85b73" fill-opacity="0.07" /><circle cx="1240" cy="270" r="32.0" fill="#c85b73" fill-opacity="0.14" /><circle cx="1240" cy="270" r="17.6" fill="#c85b73" fill-opacity="0.32" /><circle cx="1310" cy="370" r="36.0" fill="#c85b73" fill-opacity="0.07" /><circle cx="1310" cy="370" r="24.0" fill="#c85b73" fill-opacity="0.14" /><circle cx="1310" cy="370" r="13.200000000000001" fill="#c85b73" fill-opacity="0.32" /><circle cx="1380" cy="220" r="60.0" fill="#c85b73" fill-opacity="0.07" /><circle cx="1380" cy="220" r="40.0" fill="#c85b73" fill-opacity="0.14" /><circle cx="1380" cy="220" r="22.0" fill="#c85b73" fill-opacity="0.32" /><line x1="405" y1="330" x2="560" y2="330" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="482" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#285b7a">作用 h</text><line x1="930" y1="330" x2="1085" y2="330" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="1007" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#285b7a">叠加</text><rect x="230" y="615" width="1040" height="65" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="657" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">若 PSF 随位置、亮度或时间改变，单个卷积核不再足以描述整幅图像</text></svg>