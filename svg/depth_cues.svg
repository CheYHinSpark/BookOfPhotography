<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-label="单张照片中的多种深度线索"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="790" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">平面照片没有真实纵深；遮挡、尺度、透视、清晰度与空气共同制造深度解释</text><rect x="40" y="110" width="325" height="535" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="202.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">遮挡与相对大小</text><text x="202.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">前物覆盖后物；熟悉尺度帮助判断</text><circle cx="245" cy="410" r="78" fill="#8fb7d9" /><circle cx="170" cy="435" r="58" fill="#d69b67" /><text x="205" y="545" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">覆盖关系给出前后顺序</text><rect x="405" y="110" width="325" height="535" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="567.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">线性透视与纹理梯度</text><text x="567.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">平行线汇聚；纹理随距离变密</text><line x1="460" y1="355" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="675" y1="355" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="460" y1="410" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="675" y1="410" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="460" y1="470" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="675" y1="470" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="460" y1="535" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="675" y1="535" x2="570" y2="305" stroke="#527da3" stroke-width="2" stroke-linecap="round" /><line x1="490" y1="335.0" x2="650" y2="335.0" stroke="#9ab3c6" stroke-width="2" stroke-linecap="round" /><line x1="490" y1="370.0" x2="650" y2="370.0" stroke="#9ab3c6" stroke-width="2" stroke-linecap="round" /><line x1="490" y1="418.2444980501905" x2="650" y2="418.2444980501905" stroke="#9ab3c6" stroke-width="2" stroke-linecap="round" /><line x1="490" y1="473.1877713600117" x2="650" y2="473.1877713600117" stroke="#9ab3c6" stroke-width="2" stroke-linecap="round" /><line x1="490" y1="532.9898987322333" x2="650" y2="532.9898987322333" stroke="#9ab3c6" stroke-width="2" stroke-linecap="round" /><rect x="770" y="110" width="325" height="535" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="932.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">空气透视与色彩分离</text><text x="932.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">远处对比降低、偏向环境光色</text><path d="M 825 520 l 105.0 -145 l 105.0 145 z" fill="#4d8c6a" fill-opacity="0.9" /><path d="M 870 450 l 77.5 -105 l 77.5 105 z" fill="#4d8c6a" fill-opacity="0.58" /><path d="M 915 380 l 52.5 -72 l 52.5 72 z" fill="#4d8c6a" fill-opacity="0.3" /><rect x="805" y="280" width="255" height="280" fill="#a8d5e8" fill-opacity=".20" /><rect x="1135" y="110" width="325" height="535" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1297.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">清晰度与虚化</text><text x="1297.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">焦点选择提示层级，但可被后期伪造</text><circle cx="1240" cy="420" r="81.0" fill="#7b4b74" fill-opacity="0.06111111111111111" /><circle cx="1240" cy="420" r="60.75000000000001" fill="#7b4b74" fill-opacity="0.08148148148148147" /><circle cx="1240" cy="420" r="45.0" fill="#7b4b74" fill-opacity="0.11" /><circle cx="1300" cy="420" r="68.4" fill="#7b4b74" fill-opacity="0.125" /><circle cx="1300" cy="420" r="51.300000000000004" fill="#7b4b74" fill-opacity="0.16666666666666666" /><circle cx="1300" cy="420" r="38.0" fill="#7b4b74" fill-opacity="0.225" /><circle cx="1365" cy="420" r="54.0" fill="#7b4b74" fill-opacity="0.24444444444444444" /><circle cx="1365" cy="420" r="40.5" fill="#7b4b74" fill-opacity="0.3259259259259259" /><circle cx="1365" cy="420" r="30.0" fill="#7b4b74" fill-opacity="0.44" /><text x="1300" y="540" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">最清晰处常被解释为主体层</text><rect x="225" y="700" width="1050" height="58" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="742" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">单一线索可能歧义；多种线索方向一致时，深度感通常更稳定</text></svg>