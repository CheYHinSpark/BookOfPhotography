<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 1500 810" role="img" aria-label="屏幕到打印的介质差异与软打样"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="810" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">屏幕发光，纸张反光：色域、黑位、白点和局部对比不可能逐像素复制</text><rect x="45" y="125" width="420" height="450" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="255.0" y="167" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#285b7a">屏幕</text><text x="255.0" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">加色 RGB · 自发光</text><circle cx="170" cy="345" r="82" fill="#ff4b5c" fill-opacity=".48" /><circle cx="265" cy="345" r="82" fill="#43c56b" fill-opacity=".48" /><circle cx="218" cy="425" r="82" fill="#4a73ff" fill-opacity=".48" /><text x="255" y="530" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">峰值与黑位由显示器和环境决定</text><rect x="540" y="125" width="420" height="450" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="167" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#8a5f19">打印</text><text x="750.0" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">减色墨层 · 反射介质</text><rect x="645" y="285" width="210" height="210" fill="#f4efe1" stroke="#d5c8aa" stroke-width="3" /><rect x="680" y="325" width="140" height="38" fill="#00a7c4" fill-opacity="0.52" /><rect x="680" y="370" width="140" height="38" fill="#d23c8a" fill-opacity="0.48" /><rect x="680" y="415" width="140" height="38" fill="#e7c441" fill-opacity="0.55" /><text x="750" y="530" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">纸白、墨黑、表面与观察光共同决定</text><rect x="1035" y="125" width="420" height="450" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1245.0" y="167" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#397456">软打样</text><text x="1245.0" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">源图 → 打印配置 → 模拟显示</text><circle cx="1090" cy="285" r="38" fill="#3b82b5" fill-opacity=".78" /><text x="1090" y="360" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#3b82b5">源色</text><circle cx="1215" cy="285" r="38" fill="#c58a2d" fill-opacity=".78" /><text x="1215" y="360" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#c58a2d">映射</text><circle cx="1340" cy="285" r="38" fill="#4d8c6a" fill-opacity=".78" /><text x="1340" y="360" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" fill="#4d8c6a">预览</text><line x1="1130" y1="285" x2="1170" y2="285" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1255" y1="285" x2="1295" y2="285" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="1245" y="405" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">纸张配置 + 渲染意图
黑点补偿 + 观看光</text><rect x="230" y="685" width="1040" height="68" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="727" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#a24862">软打样只能在已校准屏幕上近似打印外观；最终纸张、墨水和照明仍需实样验证</text></svg>