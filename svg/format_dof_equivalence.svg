<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="650" viewBox="0 0 1400 650" role="img" aria-label="不同画幅的景深等效"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker></defs><rect width="1400" height="650" fill="#fbfdff" /><text x="700.0" y="44" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">相同视角与景深：焦距、f 数和画幅按同一比例缩放</text><line x1="260" y1="270.0" x2="260" y2="410.0" stroke="#3b82b5" stroke-width="6" stroke-linecap="round" /><line x1="420" y1="265.0" x2="420" y2="415.0" stroke="#334e68" stroke-width="7" stroke-linecap="round" /><line x1="260" y1="340" x2="40" y2="236.875" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" /><line x1="260" y1="340" x2="40" y2="443.125" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" /><line x1="260" y1="340" x2="420" y2="265.0" stroke="#3b82b5" stroke-width="2" stroke-linecap="round" /><line x1="260" y1="340" x2="420" y2="415.0" stroke="#3b82b5" stroke-width="2" stroke-linecap="round" /><text x="340.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#3b82b5">小画幅</text><text x="340.0" y="545" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#3b82b5">f, N, c₀</text><text x="340.0" y="585" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">入瞳 D = f/N 相同</text><line x1="870" y1="270.0" x2="870" y2="410.0" stroke="#a24862" stroke-width="6" stroke-linecap="round" /><line x1="1190" y1="190.0" x2="1190" y2="490.0" stroke="#334e68" stroke-width="7" stroke-linecap="round" /><line x1="870" y1="340" x2="650" y2="236.875" stroke="#a24862" stroke-width="3" stroke-linecap="round" /><line x1="870" y1="340" x2="650" y2="443.125" stroke="#a24862" stroke-width="3" stroke-linecap="round" /><line x1="870" y1="340" x2="1190" y2="190.0" stroke="#a24862" stroke-width="2" stroke-linecap="round" /><line x1="870" y1="340" x2="1190" y2="490.0" stroke="#a24862" stroke-width="2" stroke-linecap="round" /><text x="1030.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#a24862">大画幅 k = 2 示意</text><text x="1030.0" y="545" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#a24862">2f, 2N, 2c₀</text><text x="1030.0" y="585" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">入瞳 D = f/N 相同</text><line x1="700" y1="85" x2="700" y2="585" stroke="#c5d1da" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 8" /><text x="700" y="625" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#627d98">机位、视角与最终输出一致时，两者得到近似相同的离焦几何</text></svg>