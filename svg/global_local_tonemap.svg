crosoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">ℓ=log L</text><text x="160.0" y="542" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">对数亮度</text><rect x="365" y="465" width="190" height="120" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="460.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">b=Gσ*ℓ</text><text x="460.0" y="542" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">平滑基底</text><rect x="665" y="465" width="190" height="120" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="760.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">d=ℓ−b</text><text x="760.0" y="542" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">局部细节</text><rect x="965" y="465" width="190" height="120" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1060.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">ℓ′=αb+βd</text><text x="1060.0" y="542" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">压基底/保细节</text><rect x="1265" y="465" width="190" height="120" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1360.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">L′=exp ℓ′</text><text x="1360.0" y="542" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">输出</text><line x1="260" y1="525" x2="355" y2="525" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="560" y1="525" x2="655" y2="525" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="860" y1="525" x2="955" y2="525" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1160" y1="525" x2="1255" y2="525" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="240" y="630" width="1020" height="68" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="672" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">边缘不保持的平滑会让基底跨越物体边界，重组后形成 halo；细节增益也会放大噪声</text></svg>