<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-label="ICC色彩管理的源配置连接空间与目标设备链路"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="790" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">颜色管理不是“统一 RGB 数字”，而是借助配置文件保持颜色含义</text><rect x="45" y="170" width="240" height="175" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="165.0" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">源数据</text><text x="165" y="275" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">相机 RGB / 工作 RGB</text><text x="165" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">带源配置文件</text><rect x="330" y="170" width="240" height="175" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="450.0" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">源变换</text><text x="450" y="275" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">矩阵 / TRC / LUT</text><text x="450" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">源状态 → PCS</text><rect x="615" y="170" width="240" height="175" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="735.0" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">连接空间 PCS</text><text x="735" y="275" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">XYZ 或 Lab</text><text x="735" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">规定白点与参照</text><rect x="900" y="170" width="240" height="175" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1020.0" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">目标变换</text><text x="1020" y="275" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">PCS → 设备值</text><text x="1020" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">含色域映射</text><rect x="1185" y="170" width="240" height="175" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1305.0" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">输出设备</text><text x="1305" y="275" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">显示 RGB / 打印 CMYK</text><text x="1305" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">在规定状态下</text><line x1="285" y1="258" x2="320" y2="258" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="570" y1="258" x2="605" y2="258" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="855" y1="258" x2="890" y2="258" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1140" y1="258" x2="1175" y2="258" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="160" y="465" width="500" height="145" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="410.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#285b7a">校准 calibration</text><text x="410.0" y="541" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">把设备调到可重复目标状态：白点、亮度、灰阶响应</text><rect x="840" y="465" width="500" height="145" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1090.0" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">表征 profiling</text><text x="1090.0" y="541" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">测量该状态下数值与颜色的映射，生成配置文件</text><line x1="660" y1="538" x2="825" y2="538" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-purple)" /><rect x="250" y="690" width="1000" height="55" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="732" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#8a5f19">配置文件描述设备，不自动修好设备；缺失或误分配源配置会让同一数字产生错误颜色</text></svg>