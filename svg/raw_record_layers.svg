<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="RAW文件由马赛克测量、校准元数据、几何元数据和预览共同组成"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750" y="45" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">RAW 是“测量数组 + 解释它所需的条件”，不是已经完成的 RGB 图像</text><rect x="155" y="95" width="1190" height="78" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="750.0" y="137" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">马赛克码值</text><text x="750.0" y="171" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">每个像素只测一个 CFA 通道；可能压缩或打包</text><rect x="155" y="195" width="1190" height="78" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="750.0" y="237" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">辐射校准</text><text x="750.0" y="271" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">黑电平 · 白电平 · 线性化表 · 增益图 · 坏点</text><rect x="155" y="295" width="1190" height="78" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="337" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">颜色条件</text><text x="750.0" y="371" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">CFA 光谱标签 · 白平衡 · 颜色矩阵 · 参考照明</text><rect x="155" y="395" width="1190" height="78" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="750.0" y="437" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">几何与拍摄元数据</text><text x="750.0" y="471" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">裁切区 · 方向 · 镜头信息 · 时间 · 曝光参数</text><rect x="155" y="495" width="1190" height="78" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="537" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">预览与缩略图</text><text x="750.0" y="571" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">快速显示用 JPEG；通常已经去马赛克和色调映射</text><line x1="95" y1="95" x2="95" y2="572" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="95" y1="134" x2="145" y2="134" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="95" y1="234" x2="145" y2="234" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="95" y1="334" x2="145" y2="334" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="95" y1="434" x2="145" y2="434" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="95" y1="534" x2="145" y2="534" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><text x="95" y="625" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#7b4b74">同一容器</text><rect x="280" y="620" width="940" height="62" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="750.0" y="662" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">缺少校准元数据时，同一整数数组可对应不同黑点、尺度、颜色与有效画幅</text></svg>