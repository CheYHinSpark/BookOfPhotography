<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-label="在线性光和sRGB编码域平均黑白的不同结果"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="700" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">平均、卷积和透明混合必须在线性光域进行</text><line x1="750" y1="88" x2="750" y2="645" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="375" y="100" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">正确：先解码到线性光</text><rect x="70" y="150" width="210" height="120" rx="16" fill="#111820" stroke="#111820" stroke-width="2.5" /><text x="175.0" y="192" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#ffffff">黑</text><text x="175.0" y="227" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">L=0</text><rect x="470" y="150" width="210" height="120" rx="16" fill="#ffffff" stroke="#9fb3c2" stroke-width="2.5" /><text x="575.0" y="192" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">白</text><text x="575.0" y="227" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">L=1</text><text x="375" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700" fill="#334e68">+</text><line x1="190" y1="300" x2="560" y2="300" stroke="#4d8c6a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-green)" /><text x="375" y="335" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#397456">线性平均：(0+1)/2 = 0.5</text><rect x="220" y="380" width="310" height="125" rx="16" fill="#bcbcbc" stroke="#4d8c6a" stroke-width="2.5" /><text x="375.0" y="422" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#ffffff">线性 50% 灰</text><text x="375.0" y="457" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">编码值 ≈ 0.735</text><text x="375" y="565" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">显示光确为白色亮度的一半</text><text x="1125" y="100" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#a24862">错误：直接平均编码码值</text><rect x="820" y="150" width="210" height="120" rx="16" fill="#111820" stroke="#111820" stroke-width="2.5" /><text x="925.0" y="192" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#ffffff">黑码</text><text x="925.0" y="227" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">V=0</text><rect x="1220" y="150" width="210" height="120" rx="16" fill="#ffffff" stroke="#9fb3c2" stroke-width="2.5" /><text x="1325.0" y="192" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">白码</text><text x="1325.0" y="227" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">V=1</text><text x="1125" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700" fill="#334e68">+</text><line x1="940" y1="300" x2="1310" y2="300" stroke="#c85b73" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-red)" /><text x="1125" y="335" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#a24862">码值平均：(0+1)/2 = 0.5</text><rect x="970" y="380" width="310" height="125" rx="16" fill="#808080" stroke="#c85b73" stroke-width="2.5" /><text x="1125.0" y="422" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#ffffff">编码 50% 灰</text><text x="1125.0" y="457" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">解码线性光 ≈ 0.214</text><text x="1125" y="565" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#a24862">只有约 21.4% 的白色线性亮度</text><rect x="285" y="610" width="930" height="58" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="652" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">相同的“0.5”在不同域中代表不同物理量；先确认坐标域，再进行运算</text></svg>