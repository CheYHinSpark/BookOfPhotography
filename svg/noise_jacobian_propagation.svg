<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="图像处理管线中的均值协方差与雅可比传播"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">数值被变换时，噪声的均值、方差、相关性和分布也一起被变换</text><rect x="55" y="120" width="155" height="105" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="132.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#102a43">传感器域</text><text x="132.5" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">μ, Σ</text><rect x="365" y="120" width="155" height="105" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="442.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#102a43">线性算子 A</text><text x="442.5" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">μ′=Aμ</text><rect x="675" y="120" width="155" height="105" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="752.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#102a43">非线性算子 f</text><text x="752.5" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">局部雅可比 J</text><rect x="985" y="120" width="155" height="105" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1062.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#102a43">重采样/锐化</text><text x="1062.5" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">产生空间相关</text><rect x="1295" y="120" width="155" height="105" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1372.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#102a43">输出域</text><text x="1372.5" y="196" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">信号相关噪声</text><line x1="210" y1="172" x2="355" y2="172" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="520" y1="172" x2="665" y2="172" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="830" y1="172" x2="975" y2="172" stroke="#527da3" stroke-width="3" stroke-linecap="round"