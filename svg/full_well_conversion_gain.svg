C, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">电压变化 ΔV</text><line x1="125" y1="520" x2="620" y2="235" stroke="#3b82b5" stroke-width="5" stroke-linecap="round" /><line x1="620" y1="235" x2="620" y2="540" stroke="#3b82b5" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><text x="520" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">低转换增益 LCG</text><text x="620" y="602" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#285b7a">较大满阱</text><line x1="125" y1="520" x2="430" y2="180" stroke="#c85b73" stroke-width="5" stroke-linecap="round" /><line x1="430" y1="180" x2="430" y2="540" stroke="#c85b73" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><text x="305" y="260" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#a24862">高转换增益 HCG</text><text x="430" y="602" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#a24862">较小满阱</text><text x="1085" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#397456">同一电压摆幅 ΔVmax</text><rect x="820" y="155" width="530" height="125" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1085.0" y="199" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#285b7a">LCG：电容较大，µV/e⁻ 较低</text><text x="1085.0" y="239" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">更多电子才走完整个电压摆幅</text><rect x="820" y="325" width="530" height="125" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1085.0" y="369" text-anchor="middle" 