<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800" role="img" aria-label="镜头选择的参数空间与任务约束"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="800" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">镜头不是一个锐度数字：视角、入瞳、距离、成像与操作共同构成解</text><rect x="45" y="255" width="250" height="210" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="170.0" y="297" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#285b7a">题材与机位</text><text x="170.0" y="331" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">要站在哪里？
要包含多少环境？</text><rect x="410" y="105" width="400" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="610.0" y="147" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">视角 / 焦距</text><text x="610.0" y="181" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">决定取景范围；机位决定透视</text><line x1="295" y1="360" x2="395" y2="165" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="410" y="270" width="400" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="610.0" y="312" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">最大入瞳 D=f/N</text><text x="610.0" y="346" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">光子、景深、对焦与体积</text><line x1="295" y1="360" x2="395" y2="330" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="410" y="435" width="400" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="610.0" y="477" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">工作距离 / 最近对焦</text><text x="610.0" y="511" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">遮挡、放大率与沟通空间</text><line x1="295" y1="360" x2="395" y2="495" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="410" y="600" width="400" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="610.0" y="642" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">MTF / 像差 / 眩光</text><text x="610.0" y="676" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">随光圈、焦距、距离和像高变化</text><line x1="295" y1="360" x2="395" y2="660" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="930" y="155" width="480" height="185" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1170.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">定焦</text><text x="1170.0" y="231" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">更少焦段自由度；可换取体积、入瞳、校正或操作一致性</text><rect x="930" y="420" width="480" height="185" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1170.0" y="462" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#8a5f19">变焦</text><text x="1170.0" y="496" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">快速改变视角；光圈、成像与体积在范围内共同折中</text><rect x="315" y="745" width="870" height="45" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="787" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#a24862">定焦与变焦是不同约束解，不是天然的画质等级</text></svg>