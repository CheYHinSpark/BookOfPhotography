<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-label="光源角尺寸与阴影半影宽度"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="790" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">光的软硬由主体看到的光源角尺寸决定，不由柔光附件名称决定</text><rect x="60" y="105" width="665" height="520" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="392.5" y="147" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">小 / 远光源</text><text x="392.5" y="181" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">阴影边缘窄</text><rect x="140" y="285.0" width="26" height="70" rx="9" fill="#f1c75b" /><circle cx="410" cy="330" r="38" fill="#334e68" /><rect x="650" y="190" width="20" height="310" rx="8" fill="#d9e3ea" /><line x1="166" y1="285.0" x2="650" y2="298.22222222222223" stroke="#c85b73" stroke-width="2.5" stroke-linecap="round" /><line x1="166" y1="355.0" x2="650" y2="379.55555555555554" stroke="#c85b73" stroke-width="2.5" stroke-linecap="round" /><line x1="166" y1="285.0" x2="650" y2="441.77777777777777" stroke="#c85b73" stroke-width="2.5" stroke-linecap="round" /><line x1="166" y1="355.0" x2="650" y2="236.0" stroke="#c85b73" stroke-width="2.5" stroke-linecap="round" /><rect x="647" y="288" width="26" height="84" fill="#c85b73" fill-opacity=".25" /><text x="395" y="555" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#c85b73">α ≈ D/R　　半影宽 w ≈ zα</text><rect x="770" y="105" width="665" height="520" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1102.5" y="147" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">大 / 近光源</text><text x="1102.5" y="181" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">半影宽，明暗过渡软</text><rect x="850" y="225.0" width="26" height="190" rx="9" fill="#f1c75b" /><circle cx="1120" cy="330" r="38" fill="#334e68" /><rect x="1360" y="190" width="20" height="310" rx="8" fill="#d9e3ea" /><line x1="876" y1="225.0" x2="1360" y2="351.55555555555554" stroke="#4d8c6a" stroke-width="2.5" stroke-linecap="round" /><line x1="876" y1="415.0" x2="1360" y2="326.22222222222223" stroke="#4d8c6a" stroke-width="2.5" stroke-linecap="round" /><line x1="876" y1="225.0" x2="1360" y2="495.1111111111111" stroke="#4d8c6a" stroke-width="2.5" stroke-linecap="round" /><line x1="876" y1="415.0" x2="1360" y2="182.66666666666669" stroke="#4d8c6a" stroke-width="2.5" stroke-linecap="round" /><rect x="1357" y="192" width="26" height="276" fill="#4d8c6a" fill-opacity=".25" /><text x="1105" y="555" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#4d8c6a">α ≈ D/R　　半影宽 w ≈ zα</text><rect x="235" y="680" width="1030" height="66" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="722" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">同一柔光箱移近主体，角尺寸增大而光更软；移远后即使物理尺寸不变也会变硬</text></svg>