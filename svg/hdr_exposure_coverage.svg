t-size="15" font-weight="400" fill="#486581">保住高光；阴影噪声大</text><text x="255" y="595" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#627d98">噪声主导</text><text x="1180" y="595" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#a24862">饱和 / 只剩下界</text><rect x="335" y="720" width="830" height="52" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="750.0" y="762" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#285b7a">融合先把各帧除以曝光尺度回到共同辐射坐标，再按可靠性选择或加权</text></svg>