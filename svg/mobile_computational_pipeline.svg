amily="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">颜色与色调</text><text x="1125" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">白平衡</text><text x="1125" y="248" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">局部映射</text><rect x="1285" y="130" width="180" height="155" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1375.0" y="172" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">输出</text><text x="1375" y="222" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">锐化/压缩</text><text x="1375" y="248" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">屏幕预览</text><line x1="215" y1="207" x2="275" y2="207" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="465" y1="207" x2="525" y2="207" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="715" y1="207" x2="775" y2="207" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="965" y1="207" x2="1025" y2="207" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1215" y1="207" x2="1275" y2="207" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="120" y="420" width="270" height="125" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="255.0" y="462" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">帧内模糊</text><text x="255.0" y=