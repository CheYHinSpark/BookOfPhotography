<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800" role="img" aria-label="JPEG压缩交付与平台二次处理链"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="800" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">交付文件会经历颜色变换、降采样、量化与平台重编码；每一步伪影不同</text><rect x="35" y="135" width="190" height="165" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="130.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">RGB</text><text x="130" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">目标尺寸</text><text x="130" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">已完成锐化</text><rect x="265" y="135" width="190" height="165" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="360.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">YCbCr</text><text x="360" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">亮度/色度</text><text x="360" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">坐标变换</text><rect x="495" y="135" width="190" height="165" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="590.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">色度子采样</text><text x="590" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">4:4:4 / 4:2:2</text><text x="590" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">4:2:0</text><rect x="725" y="135" width="190" height="165" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="820.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">8×8 DCT</text><text x="820" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">空间块 →</text><text x="820" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">频率系数</text><rect x="955" y="135" width="190" height="165" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1050.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">量化</text><text x="1050" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">高频精度下降</text><text x="1050" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">主要有损步骤</text><rect x="1185" y="135" width="190" height="165" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1280.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">熵编码</text><text x="1280" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">无损打包</text><text x="1280" y="265" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">生成 JPEG</text><line x1="225" y1="218" x2="255" y2="218" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="455" y1="218" x2="485" y2="218" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="685" y1="218" x2="715" y2="218" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="915" y1="218" x2="945" y2="218" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1145" y1="218" x2="1175" y2="218" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="145" y="405" width="260" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="275.0" y="447" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">颜色边缘变软</text><text x="275.0" y="481" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">子采样</text><rect x="440" y="405" width="260" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="570.0" y="447" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">块效应</text><text x="570.0" y="481" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">粗量化 + 低码率</text><rect x="735" y="405" width="260" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="865.0" y="447" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">振铃 / 蚊噪</text><text x="865.0" y="481" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">高频系数丢失</text><rect x="1030" y="405" width="260" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1160.0" y="447" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">渐变断层</text><text x="1160.0" y="481" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">量化 + 再处理</text><rect x="365" y="610" width="770" height="95" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="652" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#8a5f19">平台二次处理</text><text x="750.0" y="686" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">重缩放 · 去除配置文件 · 再压缩 · HDR/SDR 映射 · 缩略图缓存</text><line x1="1280" y1="300" x2="1040" y2="595" stroke="#c58a2d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gold)" /><rect x="270" y="735" width="960" height="45" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="777" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#a24862">母版保留余量；交付版本只为一个已知接口优化，避免反复 JPEG 重存</text></svg>