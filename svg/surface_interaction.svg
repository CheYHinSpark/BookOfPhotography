<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="780" viewBox="0 0 1500 780" role="img" aria-label="光在表面的反射透射吸收与方向分布"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="780" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">材质外观不是表面的固定颜色：入射方向、观察方向与能量分配共同决定</text><rect x="60" y="230" width="220" height="130" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="170.0" y="272" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#8a5f19">光源</text><text x="170.0" y="306" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">光谱 · 方向 · 角尺寸</text><rect x="610" y="150" width="34" height="470" rx="10" fill="#94aabd" /><text x="627" y="655" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#486581">表面与法线</text><line x1="627" y1="385" x2="627" y2="205" stroke="#334e68" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-dark)" /><text x="650" y="225" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#334e68">n</text><line x1="280" y1="295" x2="595" y2="365" stroke="#c58a2d" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-gold)" /><text x="430" y="300" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">入射</text><rect x="1190" y="235" width="245" height="130" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1312.5" y="277" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">相机 / 观察者</text><text x="1312.5" y="311" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">只接收某些出射方向</text><line x1="655" y1="360" x2="1175" y2="295" stroke="#3b82b5" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="905" y="295" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">镜面分量</text><line x1="642" y1="390" x2="759.3678906964727" y2="610.7368982147317" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="642" y1="390" x2="839.0026884016804" y2="543.9153688314145" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="642" y1="390" x2="883.4814565722671" y2="454.7047612756302" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="642" y1="390" x2="879.7641290737884" y2="312.74575140626314" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="642" y1="390" x2="827.7862063693485" y2="222.71734841028544" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="642" y1="390" x2="743.68416076895" y2="161.61363558934977" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)" /><text x="845" y="505" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#397456">漫反射：分散到许多方向</text><line x1="627" y1="395" x2="627" y2="610" stroke="#7b4b74" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-purple)" /><text x="700" y="585" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#7b4b74">透射 / 内部散射</text><rect x="160" y="690" width="1180" height="55" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="750.0" y="732" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">每个波长上近似满足 R(λ)+T(λ)+A(λ)=1；相机颜色还要积分光源与传感器响应</text></svg>