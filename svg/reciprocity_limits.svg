<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="600" viewBox="0 0 1450 600" role="img" aria-label="相同能量曝光与摄影结果不等价"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker></defs><rect width="1450" height="600" fill="#fbfdff" /><text x="725.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">互易律只约束积分量，不保证图像等价</text><line x1="725" y1="85" x2="725" y2="530" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="360" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#285b7a">理想静态线性探测：E₁t₁ = E₂t₂</text><rect x="105" y="180" width="140" height="300" fill="#3b82b5" fill-opacity=".45" stroke="#3b82b5" stroke-width="3" /><text x="175.0" y="510" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#3b82b5">强光 × 短时</text><rect x="390" y="330" width="280" height="150" fill="#69a87f" fill-opacity=".45" stroke="#69a87f" stroke-width="3" /><text x="530.0" y="510" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#69a87f">弱光 × 长时</text><text x="360" y="150" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#486581">矩形面积相同 → H 相同</text><text x="1085" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#a24862">摄影结果仍可能不同</text><rect x="840" y="175" width="230" height="120" rx="16" fill="#c85b73" fill-opacity=".10" stroke="#c85b73" stroke-width="2.5" /><text x="955" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#c85b73">运动积分</text><text x="955" y="257" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">轨迹长度 ∝ t</text><rect x="1110" y="175" width="230" height="120" rx="16" fill="#c58a2d" fill-opacity=".10" stroke="#c58a2d" stroke-width="2.5" /><text x="1225" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#c58a2d">闪烁照明</text><text x="1225" y="257" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">E(t) 非常数</text><rect x="840" y="350" width="230" height="120" rx="16" fill="#7b4b74" fill-opacity=".10" stroke="#7b4b74" stroke-width="2.5" /><text x="955" y="395" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#7b4b74">暗电流/温升</text><text x="955" y="432" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">额外电子随时间积累</text><rect x="1110" y="350" width="230" height="120" rx="16" fill="#4d8c6a" fill-opacity=".10" stroke="#4d8c6a" stroke-width="2.5" /><text x="1225" y="395" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#4d8c6a">快门与饱和</text><text x="1225" y="432" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">门函数、峰值受限</text></svg>