<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="固定机位与固定主体构图的透视比较"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker></defs><rect x="20" y="20" width="1160" height="320" rx="20" fill="#f2f8fc" stroke="#b4cadd" stroke-width="2" /><text x="40" y="60" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#285b7a">A  固定机位</text><circle cx="160" cy="240" r="9" fill="#102a43" /><text x="160" y="280" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#243b53">同一投影中心</text><rect x="640" y="50" width="500" height="250" fill="#ffffff" stroke="#6aa6d8" stroke-width="3" /><rect x="750" y="120" width="300" height="150" fill="none" stroke="#c85b73" stroke-width="4" stroke-dasharray="12 8" /><circle cx="900" cy="180" r="36" fill="#f3a9b9" fill-opacity="0.8" /><rect x="850" y="220" width="100" height="40" fill="#8ec5e8" /><text x="900" y="325" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#486581">长焦图像相当于广角中央裁切后统一放大</text><line x1="160" y1="240" x2="640" y2="50" stroke="#6aa6d8" stroke-width="3" stroke-linecap="round" /><line x1="160" y1="240" x2="640" y2="300" stroke="#6aa6d8" stroke-width="3" stroke-linecap="round" /><line x1="160" y1="240" x2="750" y2="120" stroke="#c85b73" stroke-width="3" stroke-linecap="round" /><line x1="160" y1="240" x2="750" y2="270" stroke="#c85b73" stroke-width="3" stroke-linecap="round" /><text x="520" y="135" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#3b82b5">广角视场</text><text x="540" y="210" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#a24862">长焦视场</text><rect x="20" y="360" width="1160" height="340" rx="20" fill="#fff8f2" stroke="#e5c3a5" stroke-width="2" /><text x="40" y="400" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#8b5e20">B  主体大小固定</text><line x1="100" y1="640" x2="1100" y2="640" stroke="#9fb3c2" stroke-width="2" stroke-linecap="round" /><circle cx="400" cy="640" r="9" fill="#3b82b5" /><text x="400" y="680" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#3b82b5">近机位 + 广角</text><circle cx="160" cy="640" r="9" fill="#a24862" /><text x="160" y="680" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#a24862">远机位 + 长焦</text><line x1="750" y1="640" x2="750" y2="520" stroke="#285b7a" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750" y="500" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#285b7a">主体</text><line x1="1000" y1="640" x2="1000" y2="500" stroke="#a24862" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-red)" /><text x="1000" y="480" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#a24862">背景</text><line x1="400" y1="640" x2="750" y2="520" stroke="#6aa6d8" stroke-width="2" stroke-linecap="round" /><line x1="400" y1="640" x2="1000" y2="500" stroke="#6aa6d8" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><line x1="160" y1="640" x2="750" y2="520" stroke="#d98298" stroke-width="2" stroke-linecap="round" /><line x1="160" y1="640" x2="1000" y2="500" stroke="#d98298" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><rect x="280" y="420" width="200" height="150" fill="#ffffff" stroke="#b8c7d1" stroke-width="2" /><line x1="340" y1="560" x2="340" y2="480" stroke="#285b7a" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" /><circle cx="415" cy="500" r="25" fill="#f3a9b9" fill-opacity="0.8" /><text x="380" y="445" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#486581">近拍 / 广角</text><rect x="60" y="420" width="200" height="150" fill="#ffffff" stroke="#b8c7d1" stroke-width="2" /><line x1="120" y1="560" x2="120" y2="480" stroke="#285b7a" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" /><circle cx="195" cy="500" r="45" fill="#f3a9b9" fill-opacity="0.8" /><text x="160" y="445" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#486581">远拍 / 长焦</text><text x="840" y="680" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="600" fill="#7b4b74">后退并增加焦距后，主体像高不变；背景相对主体变大</text></svg>