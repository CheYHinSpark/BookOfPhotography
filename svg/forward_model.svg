<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="摄影系统从场景到视觉解释的前向模型"><defs><marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#527da3" /></marker></defs><text x="600" y="30" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#102a43">摄影系统：从世界到有限观测</text><rect x="80" y="60" width="160" height="140" rx="18" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="160.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#102a43">场景</text><text x="160.0" y="145" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">几何 · 材料</text><text x="160.0" y="175" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">照明 · 运动</text><rect x="300" y="60" width="160" height="140" rx="18" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="380.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#102a43">光场</text><text x="380.0" y="145" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">位置 · 方向</text><text x="380.0" y="175" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">波长 · 时间</text><rect x="520" y="60" width="160" height="140" rx="18" fill="#fff7e8" stroke="#e9c784" stroke-width="2.5" /><text x="600.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#102a43">光学系统</text><text x="600.0" y="145" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">投影 · 孔径</text><text x="600.0" y="175" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">像差 · 衍射</text><rect x="740" y="60" width="160" height="140" rx="18" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="820.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#102a43">传感与计算</text><text x="820.0" y="145" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">积分 · 噪声</text><text x="820.0" y="175" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">采样 · 映射</text><rect x="960" y="60" width="160" height="140" rx="18" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1040.0" y="105" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#102a43">图像与观看</text><text x="1040.0" y="145" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">显示 · 适应</text><text x="1040.0" y="175" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="400" fill="#486581">识别 · 解释</text><line x1="244" y1="130.0" x2="295" y2="130.0" stroke="#527da3" stroke-width="3" marker-end="url(#arrowhead)" /><line x1="464" y1="130.0" x2="515" y2="130.0" stroke="#527da3" stroke-width="3" marker-end="url(#arrowhead)" /><line x1="684" y1="130.0" x2="735" y2="130.0" stroke="#527da3" stroke-width="3" marker-end="url(#arrowhead)" /><line x1="904" y1="130.0" x2="955" y2="130.0" stroke="#527da3" stroke-width="3" marker-end="url(#arrowhead)" /><text x="600"