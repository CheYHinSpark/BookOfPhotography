<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="780" viewBox="0 0 1500 780" role="img" aria-label="视觉适应与同时对比使相同像素产生不同外观"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="780" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">同一数值不保证同一外观：视觉会按环境与邻域重新归一化</text><rect x="55" y="110" width="410" height="480" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="260.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">暗背景</text><text x="260.0" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">同一灰块显得更亮</text><rect x="100" y="255" width="320" height="210" rx="8" fill="#1f2937" /><rect x="205" y="310" width="110" height="100" rx="7" fill="#88888