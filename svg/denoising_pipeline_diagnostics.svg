<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="780" viewBox="0 0 1500 780" role="img" aria-label="摄影降噪的诊断流程"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="780" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">先识别噪声和输出目标，再调强度；不要从“套一个模型”开始</text><rect x="55" y="120" width="275" height="150" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="192.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">1　确认输入</text><text x="192" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">RAW/JPEG · 是否锐化</text><text x="192" y="240" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">是否缩放或压缩</text><rect x="380" y="120" width="275" height="150" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="517.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">2　定位来源</text><text x="517" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">光子不足 · 读出</text><text x="517" y="240" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">去马赛克 · 处理放大</text><rect x="705" y="120" width="275" height="150" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="842.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">3　定义输出</text><text x="842" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">尺寸 · 观看距离</text><text x="842" y="240" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">打印或屏幕</text><rect x="1030" y="120" width="275" height="150" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1167.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">4　选择域与方法</text><text x="1167" y="212" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">线性/编码 · 亮度/色彩</text><text x="1167" y="240" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">局部/非局部/学习型</text><line x1="330" y1="195" x2="370" y2="195" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="655" y1="195" x2="695" y2="195" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="980" y1="195" x2="1020" y2="195" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="160" y="370" width="500" height="180" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="410.0" y="412" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">5　检查残差</text><text x="410.0" y="446" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">残差应像预期噪声，而不是仍含边缘、毛发、星点或文字</text><rect x="840" y="370" width="500" height="180" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1090.0" y="412" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#a24862">6　检查最终输出</text><text x="1090.0" y="446" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">在交付尺寸比较细节、色斑、涂抹、光晕与重复纹理</text><line x1="1167" y1="270" x2="1167" y2="350" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="840" y1="460" x2="680" y2="460" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="410" y1="550" x2="410" y2="620" stroke="#c58a2d" stroke-width="4" stroke-linecap="round" /><line x1="410" y1="620" x2="1090" y2="620" stroke="#c58a2d" stroke-width="4" stroke-linecap="round" /><line x1="1090" y1="620" x2="1090" y2="560" stroke="#c58a2d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gold)" /><text x="750" y="648" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#8a5f19">若残差有结构或输出出现伪影，回退参数、掩模或处理域</text><rect x="260" y="690" width="980" height="55" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="750.0" y="732" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#334e68">保留原始文件与可逆参数；降噪结果是面向任务的版本，不是新的原始证据</text></svg>