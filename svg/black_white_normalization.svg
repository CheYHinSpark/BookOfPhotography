<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="730" viewBox="0 0 1500 730" role="img" aria-label="黑电平白电平线性化与归一化"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="730" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">从存储码值到相对曝光：先校正偏置，再恢复线性尺度</text><line x1="95" y1="575" x2="695" y2="575" stroke="#334e68" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow-dark)" /><line x1="95" y1="575" x2="95" y2="120" stroke="#334e68" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow-dark)" /><text x="695" y="606" text-anchor="end" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#627d98">存储码值 r</text><text x="91" y="108" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#627d98">归一化响应 x</text><line x1="240" y1="575" x2="240" y2="155" stroke="#c85b73" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 7" /><line x1="590" y1="575" x2="590" y2="155" stroke="#c58a2d" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 7" /><polyline points="95.00,575.00 240.00,575.00 590.00,190.00 695.00,190.00" stroke="#3b82b5" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round" /><text x="240" y="620" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#a24862">黑电平 b</text><text x="590" y="620" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#8a5f19">白电平 w</text><text x="415.0" y="305" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#285b7a">x=(r-b)/(w-b)</text><text x="125" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#627d98">负值区</text><text x="660" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#627d98">饱和区</text><rect x="815" y="115" width="560" height="92" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1095.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#a24862">标量黑电平</text><text x="1095.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">一个 b：只能校正全局电子偏置</text><rect x="815" y="245" width="560" height="92" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1095.0" y="287" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">按通道/按行黑电平</text><text x="1095.0" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">b_c 或 b_{c,y}：校正 CFA 与读出链差异</text><rect x="815" y="375" width="560" height="92" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1095.0" y="417" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#397456">逐像素暗场模型</text><text x="1095.0" y="451" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">b_i(t,T)：进一步描述曝光时间与温度</text><line x1="1095" y1="207" x2="1095" y2="237" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1095" y1="337" x2="1095" y2="367" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="810" y="535" width="570" height="115" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1095.0" y="577" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#285b7a">线性化不是任意调曲线</text><text x="1095.0" y="611" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">它试图让校正值重新与曝光成比例；创作色调映射属于更后阶段</text></svg>