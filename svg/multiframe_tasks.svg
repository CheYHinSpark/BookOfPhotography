<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800" role="img" aria-label="多帧数据通过不同融合算子解决不同摄影问题"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="800" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">同样是一组帧，保留什么取决于融合算子：平均、选择、重建或时间统计</text><rect x="45" y="110" width="330" height="535" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="210.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">平均 / 鲁棒平均</text><text x="210.0" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">目标：降低独立噪声</text><text x="210" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#486581">静态结构相加</text><text x="210" y="270" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">异常帧降权</text><circle cx="168" cy="415" r="15" fill="#3b82b5" fill-opacity="0.22" /><circle cx="189" cy="415" r="15" fill="#3b82b5" fill-opacity="0.22" /><circle cx="210" cy="415" r="19" fill="#3b82b5" fill-opacity="0.33999999999999997" /><circle cx="231" cy="415" r="15" fill="#3b82b5" fill-opacity="0.22" /><circle cx="252" cy="415" r="15" fill="#3b82b5" fill-opacity="0.22" /><line x1="140" y1="500" x2="280" y2="500" stroke="#3b82b5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="405" y="110" width="330" height="535" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="570.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#102a43">HDR 融合</text><text x="570.0" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">目标：扩展可测亮度</text><text x="570" y="238" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#486581">不同曝光归一</text><text x="570" y="270" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">选未饱和高 SNR</text><rect x="465" y="355" width="90" height="28" rx="6" fill="#4d8c6a" fill-opacity="0.45" /><rect x="465" y="403" width="145" height="28" rx="6" fill="#4d8c6a" fill-opacity="0.6" /><rect x="465" y="451" width="210" height="28" rx="6" fill="#4d8c6a" fill-opacity="0.75" /><rect x="765" y="110" width="330" height="535" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="930.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700"