<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-label="固定曝光下低 ISO 后期提升与高 ISO 模拟增益的比较"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker></defs><rect width="1500" height="700" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">ISO 不改变输入电子数；它改变信号穿过下游读出链的尺度</text><rect x="45" y="265" width="220" height="130" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="155.0" y="309" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#397456">固定曝光</text><text x="155.0" y="349" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">同一 Ne 与同一散粒涨落</text><line x1="270" y1="330" x2="350" y2="210" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="270" y1="330" x2="350" y2="500" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="820" y="100" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#a24862">路径 A：较高模拟 ISO</text><rect x="350" y="145" width="220" height="130" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="460.0" y="189" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">模拟增益 ×8</text><text x="460.0" y="229" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">信号先放大</text><rect x="650" y="145" width="220" height="130" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="760.0" y="189" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">下游读出噪声</text><text x="760.0" y="229" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">加在放大之后</text><rect x="950" y="145" width="220" height="130" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1060.0" y="189" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">ADC</text><text x="1060.0" y="229" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">较早碰到满量程</text><rect x="1250" y="145" width="220" height="130" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1360.0" y="189" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">输出</text><text x="1360.0" y="229" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">直接达到目标明度</text><line x1="575" y1="210" x2="640" y2="210" stroke="#c85b73" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-red)" /><line x1="875" y1="210" x2="940" y2="210" stroke="#c85b73" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-red)" /><line x1="1175" y1="210" x2="1240" y2="210" stroke="#c85b73" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-red)" /><text x="820" y="395" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#285b7a">路径 B：较低 ISO + 后期 ×8</text><rect x="350" y="440" width="220" height="130" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="460.0" y="484" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">模拟增益 ×1</text><text x="460.0" y="524" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">信号保持较小</text><rect x="650" y="440" width="220" height="130" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="760.0" y="484" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">下游读出噪声</text><text x="760.0" y="524" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">相对信号更显著</text><rect x="950" y="440" width="220" height="130" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1060.0" y="484" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">ADC</text><text x="1060.0" y="524" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">保留更多高光余量</text><rect x="1250" y="440" width="220" height="130" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1360.0" y="484" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#102a43">数字提升 ×8</text><text x="1360.0" y="524" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">信号与已有噪声同乘</text><line x1="575" y1="505" x2="640" y2="505" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="875" y1="505" x2="940" y2="505" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1175" y1="505" x2="1240" y2="505" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750.0" y="635" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#7b4b74">若下游读出噪声足够小，两条路径匹配后近似相同；差异称为 ISO 不变性问题</text><text x="750.0" y="671" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">高 ISO 可能改善阴影数字化，却通常减少可用高光余量</text></svg>