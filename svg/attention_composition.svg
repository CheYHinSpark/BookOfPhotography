<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800" role="img" aria-label="构图作为注意力竞争与关系组织"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="800" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">构图不是把主体放进格子：它在有限画面内分配对比、尺度、方向与边界关系</text><rect x="55" y="105" width="760" height="560" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="435.0" y="147" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">画面中的竞争线索</text><text x="435.0" y="181" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">亮度 · 色彩 · 尺度 · 清晰度 · 人脸 · 方向</text><rect x="115" y="235" width="640" height="350" fill="#edf3f7" stroke="#829ab1" stroke-width="3" /><circle cx="405" cy="395" r="72" fill="#c85b73" /><circle cx="380" cy="380" r="7" fill="#ffffff" /><circle cx="430" cy="380" r="7" fill="#ffffff" /><rect x="620" y="270" width="90" height="70" fill="#f1c75b" /><circle cx="220" cy="505" r="38" fill="#3b82b5" /><line x1="135" y1="300" x2="370" y2="390" stroke="#4d8c6a" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-green)" /><line x1="705" y1="545" x2="465" y2="420" stroke="#7b4b74" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-purple)" /><text x="405" y="625" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#486581">主体由观看任务与关系共同指定</text><rect x="900" y="110" width="525" height="125" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1162.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#285b7a">自下而上显著性</text><text x="1162.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">局部差异、孤立特征和人脸可快速吸引注意</text><rect x="900" y="285" width="525" height="125" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1162.5" y="327" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">自上而下任务</text><text x="1162.5" y="361" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">标题、题材知识与寻找目标改变观看顺序</text><rect x="900" y="460" width="525" height="125" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1162.5" y="502" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#8a5f19">边界与裁切</text><text x="1162.5" y="536" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">切断、接触、方向延续与画外空间改变关系</text><rect x="250" y="710" width="1000" height="52" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="752" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#a24862">减少背景竞争通常比继续增强主体更自然；显著性模型不能推出审美评分</text></svg>