<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="910" viewBox="0 0 1500 910" role="img" aria-label="六个摄影最小实验的控制变量与证据"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="910" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">每个实验只回答一个问题：固定什么、改变什么、用什么证据判定</text><rect x="65" y="120" width="405" height="285" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="267.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">1 透视</text><text x="267" y="235" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="267" y="270" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">固定机位换焦距并裁切</text><text x="267" y="299" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">再移动机位保持主体大小</text><line x1="123" y1="325" x2="412" y2="325" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="267" y="358" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：比例与遮挡关系</text><rect x="530" y="120" width="405" height="285" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="732.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">2 光圈</text><text x="732" y="235" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="732" y="270" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">固定场景、对焦、输出</text><text x="732" y="299" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">只改变 f 数</text><line x1="588" y1="325" x2="877" y2="325" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="732" y="358" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：焦点/前后景/边角</text><rect x="995" y="120" width="405" height="285" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1197.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">3 运动</text><text x="1197" y="235" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="1197" y="270" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">固定速度或快门</text><text x="1197" y="299" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">防抖各拍一组</text><line x1="1053" y1="325" x2="1342" y2="325" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="1197" y="358" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：拖影方向与命中率</text><rect x="65" y="465" width="405" height="285" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="267.5" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">4 曝光与 ISO</text><text x="267" y="580" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="267" y="615" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">先固定光子量改 ISO</text><text x="267" y="644" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">再固定 ISO 改光子量</text><line x1="123" y1="670" x2="412" y2="670" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="267" y="703" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：RAW 余量与归一化噪声</text><rect x="530" y="465" width="405" height="285" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="732.5" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">5 RAW / JPEG</text><text x="732" y="580" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="732" y="615" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">同一次曝光双格式</text><text x="732" y="644" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">统一白平衡与最终尺寸</text><line x1="588" y1="670" x2="877" y2="670" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="732" y="703" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：恢复余量与已固化处理</text><rect x="995" y="465" width="405" height="285" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1197.5" y="507" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">6 后期顺序</text><text x="1197" y="580" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#627d98">控制 / 变量</text><text x="1197" y="615" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">同一 RAW 建处理分支</text><text x="1197" y="644" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#334e68">统一交付尺寸与介质</text><line x1="1053" y1="670" x2="1342" y2="670" stroke="#b9c7d3" stroke-width="2" stroke-linecap="round" /><text x="1197" y="703" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#486581">判据：伪影首次出现的位置</text><rect x="245" y="820" width="1010" height="52" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="862" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">先记录预测与失败条件；重复样本、相同输出、保留原始文件和拍摄参数</text></svg>