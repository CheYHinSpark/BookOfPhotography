<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="650" viewBox="0 0 1450 650" role="img" aria-label="入射式与反射式测光的几何差异"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker></defs><rect width="1450" height="650" fill="#fbfdff" /><text x="725.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">两种测光测量的是不同位置、不同方向集合</text><line x1="725" y1="82" x2="725" y2="575" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="360" y="92" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#397456">入射式：在主体处估计入射照度</text><circle cx="150" cy="190" r="38" fill="#ffe8a3" stroke="#c58a2d" stroke-width="3" /><text x="150" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">光源</text><rect x="510" y="270" width="90" height="185" rx="8" fill="#c6d8e6" stroke="#527da3" stroke-width="3" /><text x="555" y="485" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">主体</text><line x1="195" y1="175" x2="500" y2="286.5" stroke="#c58a2d" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow-red)" /><line x1="195" y1="