<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650" role="img" aria-label="动态范围阈值与高光余量的不同定义"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="650" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">动态范围不是单一自然数：下限取决于可用性阈值</text><line x1="125" y1="310" x2="1380" y2="310" stroke="#334e68" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-dark)" /><line x1="125.0" y1="238" x2="125.0" y2="382" stroke="#627d98" stroke-width="3" stroke-linecap="round" /><text x="125.0" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#627d98">1 e⁻</text><line x1="200.55852891165927" y1="262" x2="200.55852891165927" y2="358" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><text x="200.55852891165927" y="388" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">σr=2</text><line x1="244.75743493463526" y1="238" x2="244.75743493463526" y2="382" stroke="#c58a2d" stroke-width="3" stroke-linecap="round" /><text x="244.75743493463526" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#c58a2d">SNR≈1</text><line x1="376.0" y1="262" x2="376.0" y2="358" stroke="#627d98" stroke-width="3" stroke-linecap="round" /><text x="376.0" y="388" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#627d98">10 e⁻</text><line x1="627.0" y1="238" x2="627.0" y2="382" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" /><text x="627.0" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#3b82b5">SNR≈10</text><line x1="878.0" y1="262" x2="878.0" y2="358" stroke="#4d8c6a" stroke-width="3" stroke-linecap="round" /><text x="878.0" y="388" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#4d8c6a">中间调</text><line x1="1129.0" y1="238" x2="1129.0" y2="382" stroke="#c58a2d" stroke-width="3" stroke-linecap="round" /><text x="1129.0" y="220" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#c58a2d">高光</text><line x1="1324.3159638462946" y1="262" x2="1324.3159638462946" y2="358" stroke="#c85b73" stroke-width="3" stroke-linecap="round" /><text x="1324.3159638462946" y="388" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#c85b73">饱和 6×10⁴</text><line x1="200.55852891165927" y1="430" x2="1324.3159638462946" y2="430" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" /><line x1="200.55852891165927" y1="420" x2="200.55852891165927" y2="440" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><line x1="1324.3159638462946" y1="420" x2="1324.3159638462946" y2="440" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" /><text x="762.437246378977" y="415" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#7b4b74">工程 DR：满阱 / σr</text><line x1="244.75743493463526" y1="500" x2="1324.3159638462946" y2="500" stroke="#c58a2d" stroke-width="4" stroke-linecap="round" /><line x1="244.75743493463526" y1="490" x2="244.75743493463526" y2="510" stroke="#c58a2d" stroke-width="3" stroke-linecap="round" /><line x1="1324.3159638462946" y1="490" x2="1324.3159638462946" y2="510" stroke="#c58a2d" stroke-width="3" stroke-linecap="round" /><text x="784.536699390465" y="485" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#c58a2d">SNR=1 阈值</text><line x1="627.0" y1="570" x2="1324.3159638462946" y2="570" stroke="#3b82b5" stroke-width="4" stroke-linecap="round" /><line x1="627.0" y1="560" x2="627.0" y2="580" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" /><line x1="1324.3159638462946" y1="560" x2="1324.3159638462946" y2="580" stroke="#3b82b5" stroke-width="3" stroke-linecap="round" /><text x="975.6579819231473" y="555" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#3b82b5">照片可用阈值 SNR=10</text><line x1="1129.0" y1="165" x2="1324.3159638462946" y2="165" stroke="#c85b73" stroke-width="5" stroke-linecap="round" /><line x1="1129.0" y1="153" x2="1129.0" y2="177" stroke="#c85b73" stroke-width="3" stroke-linecap="round" /><line x1="1324.3159638462946" y1="153" x2="1324.3159638462946" y2="177" stroke="#c85b73" stroke-width="3" stroke-linecap="round" /><text x="1226.6579819231474" y="135" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#a24862">高光余量 = log₂(Nsat/Nhighlight)</text><text x="750.0" y="95" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#627d98">示例：Nsat=60000 e⁻，σr=2 e⁻；不同阈值给出不同“档数”</text></svg>