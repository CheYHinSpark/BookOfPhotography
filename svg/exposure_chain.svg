<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="560" viewBox="0 0 1500 560" role="img" aria-label="从场景辐亮度到光电子的曝光链"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker></defs><rect width="1500" height="560" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">曝光不是亮度旋钮，而是一条有单位的积分链</text><rect x="35" y="125" width="250" height="145" rx="18" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="160.0" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#102a43">场景辐亮度</text><text x="160.0" y="219" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">L(λ,x,ω)</text><rect x="330" y="125" width="250" height="145" rx="18" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="455.0" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#102a43">孔径与透过</text><text x="455.0" y="219" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">τ(λ) / N²</text><rect x="625" y="125" width="250" height="145" rx="18" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="750.0" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#102a43">像面辐照度</text><text x="750.0" y="219" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">E(λ,x)</text><rect x="920" y="125" width="250" height="145" rx="18" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1045.0" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#102a43">时间积分</text><text x="1045.0" y="219" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">H = ∫ E dt</text><rect x="1215" y="125" width="250" height="145" rx="18" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1340.0" y="180" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#102a43">光电子期望</text><text x="1340.0" y="219" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">μₑ = ∫ ηHλ/(hc)dλ</text><line x1="293" y1="197" x2="323" y2="197" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="588" y1="197" x2="618" y2="197" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="883" y1="197" x2="913" y2="197" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1178" y1="197" x2="1208" y2="197" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750" y="330" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#3d6f99">每一级都可能随位置、方向、波长和时间变化</text><line x1="130" y1="390" x2="1370" y2="390" stroke="#c6d2dc" stroke-width="2" stroke-linecap="round" /><circle cx="160" cy="390" r="7" fill="#527da3" /><text x="160" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">场景不由相机参数改变</text><circle cx="455" cy="390" r="7" fill="#527da3" /><text x="455" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">f 数控制方向锥体</text><circle cx="750" cy="390" r="7" fill="#527da3" /><text x="750" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">W·m⁻² 或光谱密度</text><circle cx="1045" cy="390" r="7" fill="#527da3" /><text x="1045" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">J·m⁻²；快门波形参与</text><circle cx="1330" cy="390" r="7" fill="#527da3" /><text x="1330" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#627d98">泊松涨落从这里出现</text><text x="750.0" y="510" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="400" fill="#7b4b74">显示明度与 JPEG 数值位于这条链之后，不能倒过来定义物理曝光</text></svg>