<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 1500 810" role="img" aria-label="照片质量诊断的证据链与首次分歧原则"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="810" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">保存中间状态，把“看起来不好”变成可定位的首次分歧</text><rect x="40" y="190" width="250" height="180" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="165.0" y="232" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">现场与设置</text><text x="165" y="293" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">光源·机位·主体</text><text x="165" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">拍摄参数与重复样本</text><rect x="330" y="190" width="250" height="180" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="455.0" y="232" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">原始观测</text><text x="455" y="293" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">RAW 数据·通道直方图</text><text x="455" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">传感器元数据</text><rect x="620" y="190" width="250" height="180" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="745.0" y="232" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">中间状态</text><text x="745" y="293" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">去马赛克·降噪·色调</text><text x="745" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">遮罩与锐化分支</text><rect x="910" y="190" width="250" height="180" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1035.0" y="232" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">交付文件</text><text x="1035" y="293" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">尺寸·配置·编码</text><text x="1035" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">平台下载回看</text><rect x="1200" y="190" width="250" height="180" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1325.0" y="232" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">实际观看</text><text x="1325" y="293" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">显示器/纸张·环境光</text><text x="1325" y="321" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">观看距离与适应</text><line x1="290" y1="280" x2="320" y2="280" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="580" y1="280" x2="610" y2="280" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="870" y1="280" x2="900" y2="280" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1160" y1="280" x2="1190" y2="280" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="190" y="505" width="430" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="405.0" y="547" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#334e68">向前追溯</text><text x="405.0" y="581" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">最终异常 → 交付 → 中间状态 → RAW → 现场</text><rect x="880" y="505" width="430" height="120" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1095.0" y="547" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#334e68">向后验证</text><text x="1095.0" y="581" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">替换单一阶段，再按相同目标重新输出</text><line x1="620" y1="565" x2="865" y2="565" stroke="#7b4b74" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-purple)" /><rect x="260" y="700" width="980" height="55" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="742" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">若 RAW 已剪切或运动细节从未记录，后期只能重建外观，不能恢复唯一真实值</text></svg>