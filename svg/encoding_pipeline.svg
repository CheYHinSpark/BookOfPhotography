<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700" role="img" aria-label="场景线性光经OETF编码传输再由EOTF形成显示亮度"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="700" fill="#fbfdff" /><text x="750.0" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#102a43">OETF、编码与 EOTF 分属不同物理域</text><rect x="35" y="120" width="250" height="125" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="160.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">场景线性光</text><text x="160.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">Lscene ∝ 辐亮度/曝光</text><rect x="330" y="120" width="250" height="125" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="455.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">创作与映射</text><text x="455.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">曝光 · 色调 · OOTF</text><rect x="625" y="120" width="250" height="125" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="750.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">OETF</text><text x="750.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">V = E(L)</text><rect x="920" y="120" width="250" height="125" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="1045.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">码值与传输</text><text x="1045.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">量化 · 存储 · 压缩</text><rect x="1215" y="120" width="250" height="125" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1340.0" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">显示 EOTF</text><text x="1340.0" y="197" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">Ld = D(V)</text><line x1="285" y1="182" x2="323" y2="182" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="580" y1="182" x2="618" y2="182" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="875" y1="182" x2="913" y2="182" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1170" y1="182" x2="1208" y2="182" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="160" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">物理/场景参照</text><text x="455" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">外观意图</text><text x="750" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">非线性编码</text><text x="1045" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">数字码域</text><text x="1340" y="285" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#7b4b74">显示光域</text><rect x="155" y="380" width="520" height="165" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="415.0" y="422" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">整体系统变换</text><text x="415.0" y="457" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">Ld = EOTF(OETF(creative(Lscene)))</text><text x="415" y="510" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">匹配的编解码可近似互逆；创作 OOTF 通常不恒等</text><rect x="825" y="380" width="520" height="165" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1085.0" y="422" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#a24862">常见错误</text><text x="1085.0" y="457" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">在线性运算前忘记逆 OETF</text><text x="1085" y="510" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">矩阵、卷积、平均与透明混合会得到错误能量关系</text><rect x="255" y="600" width="990" height="62" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="750.0" y="642" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#397456">场景参照数值回答“测到了多少光”；显示参照数值回答“设备应发出多少光”</text></svg>