<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="740" viewBox="0 0 1500 740" role="img" aria-label="场景参照与显示参照工作流"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="740" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">场景参照保留相对曝光关系；显示参照规定设备实际应产生的外观</text><rect x="55" y="130" width="250" height="115" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="180.0" y="172" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">线性场景 RGB</text><text x="180.0" y="206" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">可大于 1，也可为负</text><rect x="445" y="130" width="250" height="115" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="570.0" y="172" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">场景参照编辑</text><text x="570.0" y="206" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">曝光 · 白平衡 · 合成</text><rect x="835" y="130" width="250" height="115" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="960.0" y="172" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">外观变换</text><text x="960.0" y="206" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">色调与色域映射</text><rect x="1225" y="130" width="220" height="115" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1335.0" y="172" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">显示 RGB</text><text x="1335.0" y="206" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">有限峰值与色域</text><line x1="305" y1="187" x2="435" y2="187" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="695" y1="187" x2="825" y2="187" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1085" y1="187" x2="1215" y2="187" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750" y="315" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="#7b4b74">不可省略的方向变化：scene → appearance → display</text><rect x="110" y="390" width="560" height="185" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="390.0" y="432" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">场景参照问题</text><text x="390.0" y="466" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">“两个像素的曝光比是多少？”</text><text x="390" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#486581">线性叠加、曝光合成与颜色矩阵在这里定义</text><rect x="830" y="390" width="560" height="185" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1110.0" y="432" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#a24862">显示参照问题</text><text x="1110.0" y="466" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">“这个码值在目标屏幕上多亮？”</text><text x="1110" y="520" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#486581">黑白点、EOTF、环境光和输出介质在这里定义</text><rect x="250" y="635" width="1000" height="65" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="750.0" y="677" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#8a5f19">把显示参照像素重新当作场景辐射量，会把已经烘焙的外观曲线误当成物理光比</text></svg>