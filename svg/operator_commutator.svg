<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="两个图像算子换序与交换子"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">操作顺序的数学判据：交换子 [A,B]=AB−BA 是否为零</text><rect x="55" y="275" width="190" height="110" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="150.0" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">输入 x</text><text x="150.0" y="351" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">某一数据域</text><rect x="390" y="115" width="230" height="110" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="505.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">先 A</text><text x="505.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">例如白平衡 G</text><rect x="790" y="115" width="230" height="110" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="905.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">再 B</text><text x="905.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">例如颜色矩阵 M</text><rect x="1190" y="115" width="250" height="110" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="1315.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">BAx</text><text x="1315.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">路径 1</text><rect x="390" y="445" width="230" height="110" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="505.0" y="487" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">先 B</text><text x="505.0" y="521" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">例如颜色矩阵 M</text><rect x="790" y="445" width="230" height="110" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="905.0" y="487" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">再 A</text><text x="905.0" y="521" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">例如白平衡 G</text><rect x="1190" y="445" width="250" height="110" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1315.0" y="487" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">ABx</text><text x="1315.0" y="521" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">路径 2</text><line x1="245" y1="330" x2="315" y2="330" stroke="#527da3" stroke-width="4" stroke-linecap="round" /><line x1="315" y1="330" x2="315" y2="170" stroke="#527da3" stroke-width="4" stroke-linecap="round" /><line x1="315" y1="170" x2="380" y2="170" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="315" y1="330" x2="315" y2="500" stroke="#527da3" stroke-width="4" stroke-linecap="round" /><line x1="315" y1="500" x2="380" y2="500" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="620" y1="170" x2="780" y2="170" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1020" y1="170" x2="1180" y2="170" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="620" y1="500" x2="780" y2="500" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1020" y1="500" x2="1180" y2="500" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="750" y="330" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="27" font-weight="700" fill="#7b4b74">差值：BAx − ABx = −[A,B]x</text><rect x="405" y="620" width="690" height="65" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="750.0" y="662" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#a24862">对角增益 G 与通道混合矩阵 M 一般不交换；裁切与任何会越界的算子也通常不交换</text></svg>