<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 1500 810" role="img" aria-label="影像归档的内容层校验副本与迁移"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="810" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">归档目标不是“硬盘里还有文件”，而是未来仍能验证、解释与重建</text><rect x="85" y="115" width="660" height="100" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="415.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">原始观测</text><text x="415" y="178" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">RAW / 原视频 / 音频</text><text x="415" y="201" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">相机元数据与原始校验</text><rect x="85" y="245" width="660" height="100" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="415.0" y="287" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">决策记录</text><text x="415" y="308" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">目录、评分、编辑参数</text><text x="415" y="331" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">颜色配置、软件与版本</text><rect x="85" y="375" width="660" height="100" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="415.0" y="417" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">固定母版</text><text x="415" y="438" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">高质量渲染</text><text x="415" y="461" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">开放或广泛支持格式</text><rect x="85" y="505" width="660" height="100" rx="16" fill="#f7efff" stroke="#c9a9e8" stroke-width="2.5" /><text x="415.0" y="547" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#102a43">交付版本</text><text x="415" y="568" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">网页、打印、客户文件</text><text x="415" y="591" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#486581">尺寸与用途说明</text><rect x="860" y="115" width="500" height="120" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1110.0" y="157" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#a24862">完整性</text><text x="1110.0" y="191" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">密码学校验值：发现静默损坏与传输错误</text><rect x="860" y="285" width="500" height="120" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="1110.0" y="327" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#285b7a">冗余</text><text x="1110.0" y="361" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">不同介质、不同地点、独立故障域的多副本</text><rect x="860" y="455" width="500" height="120" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1110.0" y="497" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#397456">可解释性</text><text x="1110.0" y="531" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">格式、配置、元数据、说明与必要的软件环境</text><rect x="860" y="625" width="500" height="120" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1110.0" y="667" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#8a5f19">迁移与演练</text><text x="1110.0" y="701" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">定期复核、换介质、抽样恢复并记录结果</text><line x1="1110" y1="235" x2="1110" y2="270" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1110" y1="405" x2="1110" y2="440" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1110" y1="575" x2="1110" y2="610" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="210" y="735" width="520" height="46" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="470.0" y="777" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#334e68">目录便于查找；校验、副本和迁移才防止丢失</text></svg>