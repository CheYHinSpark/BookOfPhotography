" stroke="#a24862" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><text x="725" y="540" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#c58a2d">只知 R ≥ 上限</text><line x1="963" y1="90" x2="963" y2="585" stroke="#d7e0e7" stroke-width="2" stroke-linecap="round" /><text x="1200" y="95" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#c85b73">三通道饱和</text><rect x="1050" y="180.0" width="65" height="300.0" rx="7" fill="#c85b73" fill-opacity=".72" stroke="#c85b73" stroke-width="2" /><text x="1082" y="514" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#c85b73">R</text><line x1="1044" y1="180" x2="1122" y2="180" stroke="#a24862" stroke-width="4" stroke-linecap="round" /><rect x="1160" y="180.0" width="65" height="300.0" rx="7" fill="#4d9f69" fill-opacity=".72" stroke="#4d9f69" stroke-width="2" /><text x="1192" y="514" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#4d9f69">G</text><line x1="1154" y1="180" x2="1232" y2="180" stroke="#a24862" stroke-width="4" stroke-linecap="round" /><rect x="1270" y="180.0" width="65" height="300.0" rx="7" fill="#536fc5" fill-opacity=".72" stroke="#536fc5" stroke-width="2" /><text x="1302" y="514" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#536fc5">B</text><line x1="1264" y1="180" x2="1342" y2="180" stroke="#a24862" stroke-width="4" stroke-linecap="round" /><line x1="1030" y1="180" x2="1355" y2="180" stroke="#a24862" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 6" /><text x="1200" y="540" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#c85b73">只剩亮度下界</text><text x="725.0" y="610" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#7b4b74">高光重建必须借助邻域、其他曝光或材料先验；它是推断，不是读取被裁切的原值</text></svg>