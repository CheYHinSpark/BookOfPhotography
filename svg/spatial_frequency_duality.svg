<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="空域卷积与频域乘法"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="720" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">同一线性系统的两种坐标：空域看邻域叠加，频域看各频率的复增益</text><rect x="80" y="135" width="260" height="110" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="210.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">物体 f(x)</text><text x="210.0" y="211" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">空间结构</text><rect x="480" y="135" width="260" height="110" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="610.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">卷积 h(x)</text><text x="610.0" y="211" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">PSF</text><rect x="880" y="135" width="260" height="110" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1010.0" y="177" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">图像 g(x)</text><text x="1010.0" y="211" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">模糊 + 噪声</text><line x1="340" y1="190" x2="470" y2="190" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="740" y1="190" x2="870" y2="190" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="410" y="166" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#7b4b74">*</text><line x1="210" y1="260" x2="210" y2="390" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-purple)" /><text x="228" y="335" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#7b4b74">ℱ</text><line x1="610" y1="260" x2="610" y2="390" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-purple)" /><text x="628" y="335" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#7b4b74">ℱ</text><line x1="1010" y1="260" x2="1010" y2="390" stroke="#7b4b74" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-purple)" /><text x="1028" y="335" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#7b4b74">ℱ</text><rect x="80" y="420" width="260" height="110" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="210.0" y="462" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">F(ν)</text><text x="210.0" y="496" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">物体频谱</text><rect x="480" y="420" width="260" height="110" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="610.0" y="462" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">H(ν)</text><text x="610.0" y="496" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">OTF：复数</text><rect x="880" y="420" width="260" height="110" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1010.0" y="462" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#102a43">G(ν)=HF+N</text><text x="1010.0" y="496" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">逐频率乘法</text><line x1="340" y1="475" x2="470" y2="475" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="740" y1="475" x2="870" y2="475" stroke="#527da3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-blue)" /><text x="410" y="451" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#7b4b74">×</text><rect x="1215" y="145" width="235" height="385" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1332.5" y="187" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">必须保留相位</text><text x="1332.5" y="221" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">MTF=|H| 只给幅度</text><text x="1332" y="330" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#8a5f19">H=|H|e^{iφ}</text><text x="1332" y="390" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">零点：信息模态消失</text><text x="1332" y="430" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">相位：结构位置改变</text><rect x="250" y="620" width="1000" height="62" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="750.0" y="662" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">离散 DFT 默认循环卷积；线性卷积需要正确填充与边界模型</text></svg>