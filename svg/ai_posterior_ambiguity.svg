0" y="587" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="700" fill="#a24862">证据要求：保留观测与处理记录</text><text x="1160.0" y="621" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">区分数据约束的结构、先验补全的结构与人工编辑</text><rect x="240" y="735" width="1020" height="48" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="750.0" y="777" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" fill="#334e68">看起来更像真实照片，是感知质量；能由这一份观测唯一支持，是证据强度</text></svg>