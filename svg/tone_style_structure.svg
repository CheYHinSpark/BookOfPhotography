<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 1500 810" role="img" aria-label="空间影调结构与跨作品风格"><defs><marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#3b82b5" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker><marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c85b73" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#4d8c6a" /></marker><marker id="arrow-gold" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#c58a2d" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#7b4b74" /></marker></defs><rect width="1500" height="810" fill="#fbfdff" /><text x="750" y="43" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102a43">直方图只统计有多少，不记录在哪里；风格则来自跨作品重复出现的选择</text><rect x="45" y="110" width="650" height="510" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="370.0" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#285b7a">相同全局直方图，不同空间结构</text><text x="370.0" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">亮暗面积一致，视线与层次可以完全不同</text><rect x="105" y="275" width="230" height="220" rx="7" fill="#2f3b46" /><circle cx="220" cy="385" r="70" fill="#d9e2e8" /><text x="220" y="535" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#486581">亮主体 / 暗背景</text><rect x="385" y="275" width="230" height="220" rx="7" fill="#d9e2e8" /><circle cx="500" cy="385" r="70" fill="#2f3b46" /><text x="500" y="535" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#486581">暗主体 / 亮背景</text><rect x="120" y="200" width="28" height="35" fill="#829ab1" /><rect x="158" y="170" width="28" height="65" fill="#829ab1" /><rect x="196" y="143" width="28" height="92" fill="#829ab1" /><rect x="234" y="160" width="28" height="75" fill="#829ab1" /><rect x="272" y="187" width="28" height="48" fill="#829ab1" /><rect x="400" y="200" width="28" height="35" fill="#829ab1" /><rect x="438" y="170" width="28" height="65" fill="#829ab1" /><rect x="476" y="143" width="28" height="92" fill="#829ab1" /><rect x="514" y="160" width="28" height="75" fill="#829ab1" /><rect x="552" y="187" width="28" height="48" fill="#829ab1" /><rect x="780" y="110" width="675" height="510" rx="16" fill="#ffffff" stroke="#b9c7d3" stroke-width="2.5" /><text x="1117.5" y="152" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#8a5f19">风格是一组稳定选择的联合分布</text><text x="1117.5" y="186" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">题材 · 机位 · 光线 · 时机 · 色彩 · 影调 · 编辑</text><rect x="825" y="275" width="175" height="120" rx="16" fill="#eaf4ff" stroke="#9bc7ee" stroke-width="2.5" /><text x="912.5" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">拍什么</text><text x="912.5" y="351" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">题材/时机</text><rect x="1030" y="275" width="175" height="120" rx="16" fill="#edf8f2" stroke="#9fd6b7" stroke-width="2.5" /><text x="1117.5" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">怎样拍</text><text x="1117.5" y="351" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">机位/光线</text><rect x="1235" y="275" width="175" height="120" rx="16" fill="#fff7e8" stroke="#e8c77d" stroke-width="2.5" /><text x="1322.5" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#102a43">怎样呈现</text><text x="1322.5" y="351" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">色调/编辑</text><line x1="1000" y1="335" x2="1020" y2="335" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><line x1="1205" y1="335" x2="1225" y2="335" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)" /><rect x="880" y="455" width="475" height="105" rx="16" fill="#fff0f3" stroke="#eab0be" stroke-width="2.5" /><text x="1117.5" y="497" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#a24862">预设只作用于最后一段</text><text x="1117.5" y="531" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#486581">能复制曲线与颜色，不能替代题材、机位和光线</text><rect x="225" y="690" width="1050" height="68" rx="16" fill="#eef5fb" stroke="#a8c8e0" stroke-width="2.5" /><text x="750.0" y="732" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#285b7a">高调/低调描述画面调性与面积分布，不等同于拍摄时过曝/欠曝</text></svg>