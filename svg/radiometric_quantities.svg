<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-label="六个基本辐射量的定义关系"><defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#527da3" /></marker><marker id="arrow-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 10 4 L 0 8 z" fill="#334e68" /></marker></defs><text x="700.0" y="30" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#102a43">辐射量：对时间、面积与方向逐层取密度</text><rect x="45" y="245" width="210" height="125" rx="18" fill="#eaf4ff" stroke="#8dbce6" stroke-width="2.5" /><text x="150.0" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">辐射能</text><text x="150.0" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#285b7a">Qₑ</text><text x="150.0" y="348" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">J</text><rect x="335" y="245" width="210" height="125" rx="18" fill="#edf8f2" stroke="#8fceb0" stroke-width="2.5" /><text x="440.0" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">辐射通量</text><text x="440.0" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#285b7a">Φₑ = dQₑ/dt</text><text x="440.0" y="348" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">W</text><line x1="265" y1="307" x2="325" y2="307" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><text x="295" y="286" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#486581">时间密度</text><rect x="665" y="90" width="315" height="125" rx="18" fill="#fff7e8" stroke="#e4bd70" stroke-width="2.5" /><text x="822.5" y="127" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">辐照度 / 出射度</text><text x="822.5" y="162" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#285b7a">Eₑ / Mₑ = dΦₑ/dA</text><text x="822.5" y="193" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">W·m⁻²</text><line x1="555" y1="307" x2="635" y2="152" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><text x="595" y="221.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">面积密度 dA</text><rect x="665" y="245" width="315" height="125" rx="18" fill="#f7efff" stroke="#c4a1e4" stroke-width="2.5" /><text x="822.5" y="282" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">辐射强度</text><text x="822.5" y="317" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#285b7a">Iₑ = dΦₑ/dΩ</text><text x="822.5" y="348" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">W·sr⁻¹</text><line x1="555" y1="307" x2="635" y2="307" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><text x="595" y="299.0" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">方向密度 dΩ</text><rect x="665" y="400" width="315" height="125" rx="18" fill="#fff0f3" stroke="#e6a2b2" stroke-width="2.5" /><text x="822.5" y="437" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">辐亮度</text><text x="822.5" y="472" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600" fill="#285b7a">Lₑ = d²Φₑ/(dA⊥dΩ)</text><text x="822.5" y="503" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#627d98">W·m⁻²·sr⁻¹</text><line x1="555" y1="307" x2="635" y2="462" stroke="#527da3" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" /><text x="595" y="376.5" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#486581">面积与方向密度</text><rect x="1040" y="150" width="310" height="310" rx="20" fill="#f5f8fa" stroke="#b8c7d1" stroke-width="2" /><text x="1195" y="193" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" fill="#102a43">变量被保留到哪一步？</text><text x="1070" y="240" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600" fill="#8b5e20">Eₑ / Mₑ</text><text x="1215" y="240" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">保留位置，积分方向</text><text x="1070" y="295" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600" fill="#765097">Iₑ</text><text x="1215" y="295" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">保留方向，积分面积</text><text x="1070" y="350" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600" fill="#9a4059">Lₑ</text><text x="1215" y="350" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">同时保留位置和方向</text><text x="1070" y="405" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600" fill="#285b7a">下标 λ</text><text x="1215" y="405" text-anchor="start" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#486581">再保留波长分辨率</text><line x1="85" y1="590" x2="1315" y2="590" stroke="#9fb3c2" stroke-width="2" stroke-linecap="round" /><text x="700.0" y="630" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#486581">箭头表示取密度或边缘化后的定义关系，并不表示这些量可以无条件互相反演</text><text x="700.0" y="670" text-anchor="middle" font-family="Source Han Sans SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#7b4b74">摄影中最常见的错误，是把相同单位或相近日常名称当成相同物理量</text></svg>